        "200":
          description: Leads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/leads/{id}:
    get:
      summary: Get lead
      description: Returns a single lead with offer and client preloads for the lead detail page. Shows intake answers, contact info, and conversion status. Frontend pattern - fetch on detail page mount, cache by id.
      operationId: getLead
