        Updates a previously logged set. Used when the client corrects reps, load,
        or other values after initial logging. Frontend pattern - call on blur/save
        from the set editing UI; optimistic update, reconcile with response.
      operationId: updatePerformedSet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
