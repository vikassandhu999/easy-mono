        mood:
          type: string
          nullable: true
          enum: [tough, solid, strong]
          description: >-
            Emoji-mapped mood (UX spec Surface 3: "How did it feel?").
            Maps to the three emoji buttons on the completion screen.
            Preferred over soreness_rating for new clients.
        soreness_rating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Legacy 1-5 scale. Frontend should prefer mood over this field.
        notes:
          type: string
          nullable: true
          description: >-
            Free-text "Note for Coach Rajat (optional)". The coach sees this
            note in their client review dashboard.
    ClientLogSetRequest:
      type: object
