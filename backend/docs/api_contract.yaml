openapi: 3.0.3
info:
  title: Easy Coaching Platform API
  version: 1.0.0
  description: API contract for the Easy Coaching Platform.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/signup:
    post:
      summary: Sign up user
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/otp:
    post:
      summary: Send OTP
      operationId: authOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/verify:
    post:
      summary: Verify OTP or token
      operationId: authVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VerifyTokenRequest"
                - $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/token:
    post:
      summary: Exchange token
      operationId: authToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TokenRefreshRequest"
                - $ref: "#/components/schemas/TokenOtpRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/businesses:
    post:
      summary: Create business
      operationId: createBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessCreateRequest"
      responses:
