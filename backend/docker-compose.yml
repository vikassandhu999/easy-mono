services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  db:
    image: postgres:16-alpine
    container_name: easy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easy_password}
      POSTGRES_DB: ${POSTGRES_DB:-easy_prod}
      # Optimize PostgreSQL for 1GB VM
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Don't expose port externally for security
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-easy} -d ${POSTGRES_DB:-easy_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Memory limits for database on 1GB VM
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - easy_network

  # =============================================================================
  # Elixir/Phoenix Application
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Memory limits for 1GB VM - conservative to leave room for DB and nginx
    deploy:
      resources:
        limits:
          memory: 450M
        reservations:
          memory: 200M
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-easy}:${POSTGRES_PASSWORD:-easy_password}@db/${POSTGRES_DB:-easy_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4000"
      POOL_SIZE: ${POOL_SIZE:-5}
      # Erlang VM memory settings - CRITICAL for small VMs
      ERL_FLAGS: "+P 16384 +Q 4096 +e 1024 +t 500000 +S 1:1 +SDcpu 1:1 +sbwt none +sbwtdcpu none +sbwtdio none +A 4 +MBas aobf +MHas aobf +MBsmbcs 128 +MBlmbcs 256 +MHsmbcs 128 +MHlmbcs 256"
      ELIXIR_ERL_OPTIONS: "+P 16384 +Q 4096"
      ERL_MAX_PORTS: "4096"
      # Email configuration
      MAILER_ADAPTER: ${MAILER_ADAPTER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Easy Coaching}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@coacheasy.app}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      # Frontend URLs
      APP_URL: ${APP_URL:-https://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL:-https://localhost}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - easy_network

  # =============================================================================
  # Nginx Reverse Proxy
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: easy_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount Let's Encrypt certificates - adjust path to your certbot location
      # If using certbot, certificates are usually in /etc/letsencrypt
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      # ACME challenge directory for certificate renewal
      - certbot_webroot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - easy_network
  # Note: Migrations are now handled automatically in run.sh during app startup

volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
  certbot_webroot:
    driver: local

networks:
  easy_network:
    driver: bridge
