      type: object
      required: [actual, target, unit]
      properties:
        actual:
          type: number
          format: float
          description: Sum of logged entries for this date. 0.0 if nothing logged yet.
        target:
          type: number
          format: float
          nullable: true
          description: From the plan's macros_goal. Null if the plan doesn't set a target for this macro.
        unit:
          type: string
          description: '"cal" for calories, "g" for macronutrients.'

