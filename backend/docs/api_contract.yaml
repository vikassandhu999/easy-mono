    # ── Client Workout Session schemas ────────────────────────

    ClientWorkoutSession:
      type: object
      required:
        [
          id,
          state,
          started_at,
          performed_sets,
          last_performed_by_element,
          inserted_at,
          updated_at
        ]
      properties:
        id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        state:
          type: string
          enum: [active, completed, discarded]
        soreness_rating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        mood:
          type: string
          nullable: true
          enum: [tough, solid, strong]
          description: >-
            Emoji-mapped mood set on completion (UX spec Surface 3).
            Null if not set or if session was completed before mood support.
        notes:
          type: string
          nullable: true
        planned_workout_id:
          type: string
          nullable: true
        planned_snapshot:
          type: object
          nullable: true
          description: >-
            Point-in-time snapshot of the planned workout captured at session
            creation. Contains workout_name, day_number, and elements array
            with exercise details and planned sets. Used for plan-vs-actual
            comparison that survives subsequent plan edits.
        performed_sets:
          type: array
          items:
            $ref: "#/components/schemas/ClientPerformedSet"
        last_performed_by_element:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ClientLastPerformedEntry"
          description: >-
            Map of planned `workout_element_id` \u2192 the client's previous performance for that
            element (UX spec Surface 2.1 - "Last time" comparison on every set). Returned on
            show/active/complete/discard/update (empty object on index). Excludes the session
            itself so the client sees prior history, not the in-progress set log. Per element:
            prefers the latest completed session of the same `workout_element_id`; falls back
            to the latest completed session of the same `exercise_id` anywhere (handles coach
            plan edits that change element ids). Empty map when the client has no prior history
            or when the session has no planned_snapshot.
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ClientLastPerformedEntry:
      type: object
      required: [source, session_id, exercise_id, started_at, sets]
      properties:
        source:
          type: string
          enum: [element, exercise]
          description: >-
            `element` - matched by `workout_element_id` (ideal; same plan slot).
            `exercise` - fell back to same `exercise_id` (e.g. plan was re-assigned or edited).
        session_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        exercise_id:
          type: string
          nullable: true
        sets:
          type: array
          description: Ordered by position. One entry per set the client performed for that element/exercise in the referenced session.
          items:
            $ref: "#/components/schemas/ClientLastPerformedSet"
    ClientLastPerformedSet:
      type: object
      properties:
        position:
          type: integer
          minimum: 0
        actual_reps:
          type: string
          nullable: true
        load_value:
          type: string
          nullable: true
          description: Decimal as string.
        load_unit:
          type: string
          nullable: true
          enum: [kg, lbs, bodyweight, percent_1rm, rpe, none]
        rpe:
          type: string
          nullable: true
        rir:
          type: integer
          nullable: true
        duration_seconds:
          type: integer
          nullable: true
        distance_value:
          type: string
          nullable: true
        distance_unit:
          type: string
          nullable: true
          enum: [meters, km, miles, yards, none]
    ClientPerformedSet:
      type: object
      required: [id, position, exercise_id, workout_session_id, completed, inserted_at, updated_at]
      properties:
        id:
          type: string
        position:
          type: integer
          minimum: 0
        actual_reps:
          type: string
          nullable: true
        load_value:
          type: string
          nullable: true
          description: Decimal as string
        load_unit:
          type: string
          nullable: true
          enum: [kg, lbs, bodyweight, percent_1rm, rpe, none]
        intensity_felt:
          type: string
          nullable: true
        rpe:
          type: string
          nullable: true
          description: Decimal as string, 1-10
        rir:
          type: integer
          nullable: true
          minimum: 0
        duration_seconds:
          type: integer
          nullable: true
          minimum: 0
        distance_value:
          type: string
          nullable: true
          description: Decimal as string
        distance_unit:
          type: string
          nullable: true
          enum: [meters, km, miles, yards, none]
        tempo_actual:
          type: string
          nullable: true
        completed:
          type: boolean
        notes:
          type: string
          nullable: true
        exercise_id:
          type: string
        workout_element_id:
          type: string
          nullable: true
        workout_session_id:
          type: string
        exercise:
          $ref: "#/components/schemas/ClientExerciseSummary"
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ClientWorkoutSessionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ClientWorkoutSession"
    ClientWorkoutSessionCompleteResponse:
      type: object
      required: [data]
      description: >-
        Same shape as ClientWorkoutSessionResponse but the data object includes
        an additional `summary` key with the workout completion celebration data
        (UX spec Surface 3). Only returned from the complete endpoint.
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/ClientWorkoutSession"
            - type: object
              required: [summary]
              properties:
                summary:
                  $ref: "#/components/schemas/ClientWorkoutSessionSummary"
    ClientWorkoutSessionSummary:
      type: object
      required: [duration_minutes, sets_count, total_volume_kg, volume_delta_kg, prs, workout_streak]
      description: >-
        Computed celebration data for the workout completion screen (UX spec Surface 3).
        Returned as part of the complete endpoint response.
      properties:
        duration_minutes:
          type: integer
          nullable: true
          minimum: 0
          description: Duration of the workout in whole minutes (ended_at - started_at). Null if timestamps are missing.
        sets_count:
          type: integer
          minimum: 0
          description: Total number of performed sets logged in this session.
        total_volume_kg:
          type: number
          format: float
          description: >-
            Sum of (load_value * actual_reps) for all sets with kg or lbs load.
            Shows the raw total on the celebration screen ("16 sets - 8,420 kg total volume").
        volume_delta_kg:
          type: number
          format: float
          nullable: true
          description: >-
            Difference between this session's total_volume_kg and the previous completed
            session of the same planned_workout. Positive means progress. Null for freestyle
            sessions or when there is no previous session.
        prs:
          type: array
          description: >-
            Personal records detected in this session. Empty array for launch (PR detection
            is nice-to-have for week 1-2). When implemented, each entry will contain
            exercise name, metric type, and previous/new values.
          items:
            type: object
        workout_streak:
          $ref: "#/components/schemas/WorkoutStreak"
    ClientWorkoutSessionListResponse:
      type: object
      required: [data, count]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ClientWorkoutSession"
        count:
          type: integer
    ClientPerformedSetResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ClientPerformedSet"

    # ── Client Request schemas ────────────────────────────────

    ClientStartSessionRequest:
      type: object
      properties:
