        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      summary: List testimonials
      description: Returns all testimonials for the coach's business, ordered by position. Powers the testimonial management list. Frontend pattern - fetch on mount, cache locally, refetch after mutations.
      operationId: listTestimonials
