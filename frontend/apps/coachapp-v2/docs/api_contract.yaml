                $ref: "#/components/schemas/PublicLeadResponse"
              examples:
                created:
                  value:
                    data:
                      id: d4e5f6a7-b8c9-0123-def0-123456789abc
                      name: Vikas
                      email: vikas@email.com
                      status: new
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    PlanIdPath:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
    MealIdPath:
      name: meal_id
      in: path
      required: true
      schema:
        type: string
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
    SearchQuery:
      name: search
      in: query
      required: false
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Unprocessable entity - validation errors from Ecto changeset
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp, version]
      properties:
        status:
          type: string
        service:
          type: string
        timestamp:
          type: string
          format: date-time
        version:
          type: string
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      required: [error_code, error_message]
      properties:
        error_code:
          type: string
        error_message:
          type: string
        error_detail:
          type: object
          nullable: true
    ValidationErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: object
          description: Map of field names to arrays of error messages from Ecto changeset
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["has invalid format", "can't be blank"]
            name: ["can't be blank"]
            age: ["must be greater than 0"]
    SignupRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
    SignupResponse:
      type: object
      required: [id, email, confirmation_sent_at, inserted_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        confirmation_sent_at:
          type: string
          format: date-time
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OtpRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
        type:
          type: string
          enum: [email_confirmation, authentication]
    VerifyTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    TokenRefreshRequest:
      type: object
      required: [grant_type, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
        role:
          type: string
          enum: [owner, coach, client, guest]
    TokenOtpRequest:
      type: object
      required: [grant_type, email, otp, role]
      properties:
        grant_type:
          type: string
          enum: [otp]
        email:
          type: string
          format: email
        otp:
          type: string
        role:
          type: string
          enum: [owner, coach, client, guest]
    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, scope]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
    BusinessCreateRequest:
      type: object
      required: [name, handle]
      properties:
        name:
          type: string
        handle:
          type: string
        about:
          type: string
    BusinessUpdateRequest:
      type: object
      properties:
        name:
          type: string
        about:
          type: string
    BusinessResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Business"
    Business:
      type: object
      required: [id, name, handle, about, inserted_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        handle:
          type: string
        about:
          type: string
          nullable: true
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CoachUpdateRequest:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        bio:
          type: string
    CoachResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Coach"
    Coach:
      type: object
      required: [id, name, title, bio, inserted_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ClientInviteRequest:
      type: object
      description: At least one of email or phone is required. If only phone is provided, no invitation email is sent.
      properties:
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    ClientUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [active, inactive, onboarding]
    ClientResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Client"
    ClientListResponse:
      type: object
      required: [data, count]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        count:
          type: integer
    Client:
      type: object
      required: [id, status, inserted_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
