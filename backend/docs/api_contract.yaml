          type: string
        exercise_id:
          type: string
        workout_element_id:
          type: string
          nullable: true
          description: Null for unplanned/freestyle exercises
        position:
          type: integer
          minimum: 0
          description: Global position counter across all exercises in session
        actual_reps:
          type: string
          nullable: true
        load_value:
          type: number
          nullable: true
        load_unit:
          type: string
          enum: [kg, lbs, bodyweight, percent_1rm, rpe, none]
        completed:
          type: boolean
          default: true
        rpe:
          type: number
          nullable: true
          minimum: 1
          maximum: 10
        rir:
          type: integer
          nullable: true
          minimum: 0
        duration_seconds:
          type: integer
          nullable: true
          minimum: 0
        distance_value:
          type: number
          nullable: true
        distance_unit:
          type: string
          enum: [meters, km, miles, yards, none]
        tempo_actual:
          type: string
          nullable: true
        intensity_felt:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    ClientUpdateSetRequest:
      type: object
      properties:
        actual_reps:
          type: string
          nullable: true
        load_value:
          type: number
          nullable: true
        load_unit:
          type: string
          enum: [kg, lbs, bodyweight, percent_1rm, rpe, none]
        completed:
          type: boolean
        rpe:
          type: number
          nullable: true
        rir:
          type: integer
          nullable: true
        duration_seconds:
          type: integer
          nullable: true
        distance_value:
          type: number
          nullable: true
        distance_unit:
          type: string
          enum: [meters, km, miles, yards, none]
        tempo_actual:
          type: string
          nullable: true
        intensity_felt:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
