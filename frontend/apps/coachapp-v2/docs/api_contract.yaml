                          rating: 5
                          result_tag: Lost 15kg
                          before_image_url: "https://cdn.example.com/before.jpg"
                          after_image_url: "https://cdn.example.com/after.jpg"
                          is_featured: true
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/public/coaches/{slug}/leads:
    post:
      summary: Submit lead from public storefront
      description: Creates a new lead from the public intake form. No authentication required. Accepts the prospect's contact info and intake form answers. The offer can be specified via offer_id or offer_slug. Frontend pattern - show success message after 201, optionally redirect to a thank-you view.
      operationId: createPublicLead
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicLeadCreateRequest"
            examples:
              default:
                value:
                  name: Vikas
                  email: vikas@email.com
                  phone: "+91 98765 43210"
                  instagram_handle: "@vikas_fit"
                  offer_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  intake_answers:
                    weight: "90"
                    goal: Fat loss
                    diet_type: Non-veg
