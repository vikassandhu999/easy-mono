    ClientInviteRequest:
      type: object
      description: At least one of email or phone is required. If only phone is provided, no invitation email is sent.
      properties:
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    ClientUpdateRequest:
      type: object
      description: >-
        All fields optional. Status transitions are validated server-side per
        the spec's invariants table. Clients whose status is currently
        `pending` only reach `active` via the accept-invite flow — manual
        transitions from pending are rejected with 422. Nothing can return to
        `pending` once a Client has been linked to a User.
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        notes:
          type: string
        status:
          type: string
          enum: [active, inactive, archived]
          description: >-
            New status. `pending` is intentionally absent from the allowed
            values for this endpoint — you cannot manually set a Client to
            pending. Sending `pending` returns 422.
    ClientResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Client"
    ClientListResponse:
      type: object
      required: [data, count, summary]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        count:
          type: integer
        summary:
          $ref: "#/components/schemas/ClientSummary"
    ClientSummary:
      type: object
      description: Badge counts for dashboard tabs. Computed from all business clients regardless of current list filters.
      required: [active, pending, inactive, archived]
      properties:
        active:
          type: integer
        pending:
          type: integer
        inactive:
          type: integer
        archived:
          type: integer
    Client:
      type: object
      required: [id, status, inserted_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
          description: >-
            Post-acceptance, this is the email the client entered at Screen 1
            (which may differ from what the coach originally entered).
        first_name:
          type: string
          nullable: true
          description: >-
            When the Client is linked to a User, the User's first_name is
            authoritative. Falls back to the coach-set value if the User's
            first_name is blank, or for pending clients where no User is linked
            yet.
        last_name:
          type: string
          nullable: true
          description: >-
            See first_name — same User-wins-then-fallback rule applies.
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, pending, inactive, archived]
          description: >-
            Client status. `pending` is only reachable at invite creation and
            exits via the accept-invite flow. Coaches can transition between
            active/inactive/archived; nothing may return to pending.
        invite_url:
          type: string
          nullable: true
          description: Present for pending clients with invitation tokens. Null otherwise.
        invitation_sent_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of when the invitation was created or last resent. Null for non-pending clients.
        invitation_expires_at:
          type: string
          format: date-time
          nullable: true
          description: invitation_sent_at + 30 days. Null for non-pending clients.
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
