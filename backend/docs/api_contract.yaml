  # ── Coach Meal Logs ──────────────────────────────────────
  /v1/coach/meal_logs:
    get:
      summary: List client meal logs
      description: >-
        Returns meal logs (with nested food_log_entries) for a specific client. Requires
        client_id query param. Supports filtering by single date or date range (from/to).
        Date takes priority over range when both provided. Each MealLog has planned_snapshot
        for plan vs done comparison. Frontend pattern -- powers the coach's view of client
        nutrition. Fetch when coach opens client nutrition detail for a date.
      operationId: listCoachMealLogs
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Client's meal logs with entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachMealLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/coach/meal_logs/summary:
    get:
      summary: Daily nutrition summaries
      description: >-
        Returns per-day nutrition summaries for a client over a date range. Includes
        meals_logged count, total_entries, planned vs logged calories, replacement count,
        and unplanned count. Computed from MealLogs and FoodLogEntries. Frontend pattern --
        powers the weekly adherence strip and recent days list on the client detail page.
        Fetch with a 7-day window.
      operationId: getCoachMealLogSummary
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily nutrition summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachMealLogSummaryResponse"
              example:
                data:
                  - date: "2026-03-25"
                    meals_logged: 3
                    total_entries: 12
                    planned_calories: 1700.0
                    logged_calories: 1450.0
                    replacements: 1
                    unplanned_count: 0
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/coach/food_log_entries/{id}:
    delete:
      summary: Delete a client food log entry
      description: >-
        Allows coach to remove incorrect or test data from a client's food logs.
        Updates MealLog.logged_calories. Frontend pattern -- call from coach
        nutrition detail view when removing bad data.
      operationId: deleteCoachFoodLogEntry
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Food log entry deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  # ── Leads ───────────────────────────────────────────────────
  # ── Public Storefront ───────────────────────────────────────
  /v1/public/coaches/{slug}/profile:
    get:
      summary: Get public storefront
      description: Returns the coach's public storefront page data including profile, active offers, and active testimonials. Only returns published profiles. This endpoint is unauthenticated and powers the public landing page at coachapp.com/coach/{slug}. Frontend pattern - fetch on page load, render the full storefront page. Cache aggressively with short TTL.
      operationId: getPublicStorefront
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public storefront data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStorefrontResponse"
              examples:
                default:
                  value:
                    data:
                      profile:
                        slug: fitness-junction
                        display_name: Fitness Junction
                        bio: Certified trainer with 6+ years experience.
                        photo_url: "https://cdn.example.com/photo.jpg"
                        cover_image_url: "https://cdn.example.com/cover.jpg"
                        social_links:
                          instagram: "https://instagram.com/fitness_junction"
                        theme_color: orange
                        intake_questions:
                          - label: "Current weight?"
                            type: number
                            required: true
                      offers:
                        - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                          name: Fat Loss Program
                          slug: fat-loss-program
                          description: Comprehensive fat loss program.
                          type: nutrition_plan
                          duration_text: 8 weeks
                          price: 4999
                          currency: INR
                          price_display: "₹4,999"
                          features: [Custom meal plan, Weekly check-ins]
                          is_featured: true
                          cta_text: Get started
                      testimonials:
                        - id: c3d4e5f6-a7b8-9012-cdef-123456789012
                          client_name: Vikas
                          client_handle: "@vikas_fitness"
                          quote: Coach changed my life.
                          rating: 5
                          result_tag: Lost 15kg
                          before_image_url: "https://cdn.example.com/before.jpg"
                          after_image_url: "https://cdn.example.com/after.jpg"
                          is_featured: true
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/public/coaches/{slug}/inquiries:
    post:
      summary: Submit inquiry from public storefront
      description: Creates a new client with status pending from the public intake form. No authentication required. Replaces the old /leads endpoint — the storefront now creates clients directly. Accepts contact info, intake form answers, and optional offer reference. If offer_id is provided and valid, program_name, payment_amount, and payment_currency are auto-filled from the offer. The name field is parsed into first_name (split on first space). Frontend pattern - show success message after 201, optionally redirect to a thank-you view.
      operationId: createPublicInquiry
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicInquiryRequest"
            examples:
              default:
                value:
                  name: Vikas Sandhu
                  email: vikas@email.com
                  phone: "+91 98765 43210"
                  instagram_handle: "@vikas_fit"
                  offer_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  intake_answers:
                    weight: "90"
                    goal: Fat loss
                    diet_type: Non-veg
      responses:
        "201":
          description: Client created as pending inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInquiryResponse"
              examples:
                created:
                  value:
                    data:
                      id: d4e5f6a7-b8c9-0123-def0-123456789abc
                      first_name: Vikas
                      email: vikas@email.com
                      status: pending
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    PlanIdPath:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
    MealIdPath:
      name: meal_id
      in: path
      required: true
      schema:
        type: string
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
    SearchQuery:
      name: search
      in: query
      required: false
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Unprocessable entity - validation errors from Ecto changeset
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Gone:
      description: Resource once existed but is no longer usable (e.g. expired or already-consumed invitation or OTP).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with server state (e.g. email is already an active client of another business).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp, version]
      properties:
        status:
          type: string
        service:
          type: string
        timestamp:
          type: string
          format: date-time
        version:
          type: string
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      required: [error_code, error_message]
      properties:
        error_code:
          type: string
        error_message:
          type: string
        error_detail:
          type: object
          nullable: true
    ValidationErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: object
          description: Map of field names to arrays of error messages from Ecto changeset
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["has invalid format", "can't be blank"]
            name: ["can't be blank"]
            age: ["must be greater than 0"]
    SignupRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
    SignupResponse:
      type: object
      required: [id, email, confirmation_sent_at, inserted_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        confirmation_sent_at:
          type: string
          format: date-time
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OtpRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
        type:
          type: string
          enum: [email_confirmation, authentication]
    VerifyTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    TokenRefreshRequest:
      type: object
      required: [grant_type, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
        role:
          type: string
          enum: [owner, coach, client, guest]
    TokenOtpRequest:
      type: object
      required: [grant_type, email, otp, role]
      properties:
        grant_type:
          type: string
          enum: [otp]
        email:
          type: string
          format: email
        otp:
          type: string
        role:
          type: string
          enum: [owner, coach, client, guest]
    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, scope]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
    AcceptInviteRequest:
      type: object
      required: [invitation_token, email]
      description: >-
        Phase 1 payload. The server validates the invitation, mails an OTP to
        `email`, and does NOT mutate the Client or create a User. The caller
        must then post `AcceptInviteVerifyRequest` with the OTP to complete
        the flow.
      properties:
        invitation_token:
          type: string
          description: The token from the invitation URL.
        email:
          type: string
          format: email
          description: >-
            The email the client wants to use for login. Can differ from the
            email the coach used when sending the invite; the final Client
            record will have this email post-verification.
    AcceptInviteVerifyRequest:
      type: object
      required: [invitation_token, email, otp]
      description: >-
        Phase 2 payload. The triple must match the one that was used to
        request the OTP at Phase 1. The OTP is bound to
        `(otp, email, invitation_token)` — mismatches return 401.
      properties:
        invitation_token:
          type: string
          description: Same token used at Phase 1.
        email:
          type: string
          format: email
          description: Same email used at Phase 1.
        otp:
          type: string
          description: 6-digit code the client received by email.
    InvitationLookupResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/InvitationLookup"
    InvitationLookup:
      type: object
      required: [state]
      description: >-
        State-discriminated body returned by GET /v1/auth/invitations/{token}.
        When `state == "pending"`, `business_name`, `coach_first_name`,
        `prefill_email`, and `expires_at` are populated. For any other state,
        only `state` is present — no business/coach leak for used/expired/invalid
        tokens.
      properties:
        state:
          type: string
          enum: [pending, used, expired, invalid]
        business_name:
          type: string
          nullable: true
          description: Present only when state is `pending`.
        coach_first_name:
          type: string
          nullable: true
          description: >-
            Inviting coach's first name, or the literal "Coach" if the coach
            has no first name set. Present only when state is `pending`.
        prefill_email:
          type: string
          format: email
          nullable: true
          description: >-
            The email the coach entered when creating the invite, if any. The
            frontend uses this to pre-fill Screen 1's email input. The client
            may edit it before requesting the OTP. Null when the coach did not
            enter an email (phone-only invite). Present only when state is
            `pending`.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: invitation_sent_at + 30 days. Present only when state is `pending`.
    ClientProfile:
      type: object
      required: [id, status, workout_streak]
      properties:
        id:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, pending, inactive, archived]
        coach:
          $ref: "#/components/schemas/ClientCoach"
        workout_streak:
          $ref: "#/components/schemas/WorkoutStreak"
    WorkoutStreak:
      type: object
      required: [current, includes_today]
      description: >-
        Workout streak (UX spec Surface 7). Counts consecutive days with at least
        one completed workout session, skipping rest days (which don't break the
        chain). Freestyle workouts count. Walk-back from yesterday; today is added
        only if a session is already completed.
      properties:
        current:
          type: integer
          minimum: 0
          description: Number of consecutive workout/rest days before today, plus 1 if today has a session.
        includes_today:
          type: boolean
          description: True if a completed session exists for today (the "+1" in the streak count).
    ClientCoach:
      type: object
      description: >-
        Coach card data (UX spec Surface 6). Rendered as a thin card above the
        bottom tab bar on every client screen. Tap phone to open WhatsApp/dialer.
        Photo makes the coach feel like a person, not a name in a database.
      properties:
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
          description: Coach's phone for the "Message" tap target on the coach card.
        photo_url:
          type: string
          nullable: true
          maxLength: 2048
          description: >-
            URL of the coach's profile photo. Coaches upload this during their
            onboarding. Null until set. Frontend should show a placeholder avatar
            when null.
        business_name:
          type: string
    ClientProfileResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ClientProfile"
    ClientProfileUpdateRequest:
      type: object
      description: Only first_name, last_name, and phone are client-editable. Email and status are ignored.
      properties:
