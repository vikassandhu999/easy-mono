    # ── Client Today (Training home) schemas ──────────────────

    ClientTodayResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ClientToday"
    ClientToday:
      type: object
      required: [greeting, coaching_context, coach, today, this_week, plan, workout_streak]
      properties:
        greeting:
          $ref: "#/components/schemas/ClientTodayGreeting"
        coaching_context:
          $ref: "#/components/schemas/ClientTodayCoachingContext"
        coach:
          nullable: true
          description: >-
            Full coach card data (UX spec Surface 6.1). Frontend renders this as a
            persistent thin card above the bottom tab bar. Null only if the business
            has no coach record (shouldn't happen in normal operation).
          allOf:
            - $ref: "#/components/schemas/ClientCoach"
        today:
          $ref: "#/components/schemas/ClientTodayCard"
        this_week:
          type: array
          description: Always seven entries (Mon..Sun) when a plan is active; empty when no plan.
          items:
            $ref: "#/components/schemas/ClientTodayWeekDay"
        plan:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ClientTodayPlanSummary"
        workout_streak:
          $ref: "#/components/schemas/WorkoutStreak"
    ClientTodayGreeting:
      type: object
      required: [first_name, day_name, date]
      properties:
        first_name:
          type: string
          nullable: true
          description: Client's first name. May be null for clients that signed up without one.
        day_name:
          type: string
          description: Capitalised English weekday name ("Monday"..."Sunday").
        date:
          type: string
          format: date
    ClientTodayCoachingContext:
      type: object
      required: [coach_first_name, week_number]
      properties:
        coach_first_name:
          type: string
          nullable: true
          description: First name of the coach for this business. Shown in the Today greeting ("Week 6 with Coach Rajat").
        week_number:
          type: integer
          nullable: true
          minimum: 1
          description: >-
            Weeks elapsed since `plan.start_date` + 1. Null when no active plan or when
            the plan has no start_date.
    ClientTodayCard:
      type: object
      required:
        [
          kind,
          coach_note,
          planned_workout,
          last_session_recap,
          last_performed_by_element
        ]
      properties:
        kind:
          type: string
          enum: [workout, rest, empty, no_plan]
          description: >-
            `workout` - today has a planned workout; render the workout card.
            `rest` - today is a coach-designated rest day (and no workout is scheduled).
            `empty` - plan is active but today has no workout and is not a rest day.
            `no_plan` - client has no active plan covering today.
        coach_note:
          type: string
          nullable: true
          description: Coach's motivational note on the active plan; null if no plan or no note.
        planned_workout:
          nullable: true
          description: Present only when `kind` is `workout`.
          allOf:
            - $ref: "#/components/schemas/ClientTodayPlannedWorkout"
        last_session_recap:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ClientTodayLastSessionRecap"
        last_performed_by_element:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ClientLastPerformedEntry"
          description: >-
            Same shape as on the workout session endpoint: map of
            `workout_element_id` \u2192 prior performance summary, so the Today card can
            preview "Last time: 9 reps @ 80kg" under each exercise before the client
            starts the session. Empty when today is rest/empty/no_plan.
    ClientTodayPlannedWorkout:
      type: object
      required: [id, name, day_number, exercise_count, workout_elements]
      properties:
        id:
          type: string
        name:
          type: string
        day_number:
          type: integer
          minimum: 1
          maximum: 7
        notes:
          type: string
          nullable: true
        exercise_count:
          type: integer
          minimum: 0
        workout_elements:
          type: array
          items:
            $ref: "#/components/schemas/ClientWorkoutElement"
    ClientTodayLastSessionRecap:
      type: object
      required: [session_id, ended_at, headline]
      description: >-
        Summary of the most recent completed session of the same planned workout.
        Drives the "Last time: ..." string on the Today card and inside the active
        workout view. Null when the client has never completed this planned workout.
      properties:
        session_id:
          type: string
        ended_at:
          type: string
          format: date-time
          nullable: true
        headline:
          type: string
          nullable: true
          description: >-
            Human string describing the heaviest set of the last session, e.g.
            "Bench Press 80kg \u00d7 9". May be null when no sets have load/reps data.
    ClientTodayWeekDay:
      type: object
      required: [day_number, day_name, date, is_today, kind, planned_workout_name, session_id]
      properties:
        day_number:
          type: integer
          minimum: 1
          maximum: 7
        day_name:
          type: string
        date:
          type: string
          format: date
        is_today:
          type: boolean
        kind:
          type: string
          enum: [done, upcoming, rest, empty]
          description: >-
            `done` - a completed session exists for this day. `upcoming` - a workout is
            scheduled but not yet completed. `rest` - explicit rest day per the plan's
            rest_days (and no workout scheduled). `empty` - no workout, no rest marker.
        planned_workout_name:
          type: string
          nullable: true
          description: Name of the workout scheduled for this day, null if no workout scheduled.
        session_id:
          type: string
          nullable: true
          description: Id of the completed session on this day (latest if more than one), null otherwise.
    ClientTodayPlanSummary:
      type: object
      required: [id, name, start_date, end_date]
      properties:
        id:
          type: string
        name:
          type: string
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true

    # ── Client Exercise schemas ───────────────────────────────

    ClientExercise:
      type: object
      required: [id, name, inserted_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        instructions:
