        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Workout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete workout session
      description: Hard-deletes an incorrectly created session; frontend should gate this behind explicit confirmation. Frontend pattern - hide destructive action behind role/permission and post-confirm dialog.
      operationId: deleteWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Workout session deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/coach/sessions/{id}/complete:
    patch:
      summary: Complete workout session
      description: Transitions an active session to completed and stores end-of-session notes/ratings from finish flows. Frontend pattern - disable finish button while pending and replace active state with returned completed payload.
      operationId: completeWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSessionCompleteRequest"
            examples:
              default:
                value:
                  soreness_rating: 3
                  notes: Finished all prescribed sets.
      responses:
        "200":
          description: Workout session completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/sessions/{id}/discard:
    patch:
      summary: Discard workout session
      description: Marks a session as discarded for aborted workouts while preserving auditability in UX history. Frontend pattern - use from abort flow and immediately reflect discarded badge/state in timeline.
      operationId: discardWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Workout session discarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    PlanIdPath:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
    MealIdPath:
      name: meal_id
      in: path
      required: true
      schema:
        type: string
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
    SearchQuery:
