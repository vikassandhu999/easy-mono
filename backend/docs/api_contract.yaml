  # ── Performed Sets ────────────────────────────────────────────
  /v1/coach/performed_sets:
    post:
      summary: Log a performed set
      description: >-
        Records a single performed set within an active workout session. Called each time
        the client completes (or skips) a set during a workout. When logging against a planned
        workout, include workout_element_id to link the set to the planned exercise slot.
        For freestyle exercises (not in the plan), omit workout_element_id.
        Frontend pattern - call immediately after user taps "Log set" or the one-tap checkbox;
        optimistic update to the set table, reconcile with response.
      operationId: createPerformedSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformedSetCreateRequest"
            examples:
              default:
                value:
                  workout_session_id: 95ea7c0a-6de3-48a7-9b8a-c66f73e4a6f5
                  exercise_id: f0e1d2c3-b4a5-6789-0abc-def012345678
                  workout_element_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  position: 0
                  actual_reps: "10"
                  load_value: 80
                  load_unit: kg
                  completed: true
      responses:
        "201":
          description: Performed set created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformedSetResponse"
              example:
                data:
                  id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                  position: 0
                  actual_reps: "10"
                  load_value: 80
                  load_unit: kg
                  intensity_felt: null
                  rpe: null
                  rir: null
                  duration_seconds: null
                  distance_value: null
                  distance_unit: none
                  tempo_actual: null
                  completed: true
                  notes: null
                  exercise_id: f0e1d2c3-b4a5-6789-0abc-def012345678
                  workout_element_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  workout_session_id: 95ea7c0a-6de3-48a7-9b8a-c66f73e4a6f5
                  business_id: 4f4f7db6-44f5-4f31-a5aa-18d0f48e48ab
                  exercise:
                    id: f0e1d2c3-b4a5-6789-0abc-def012345678
                    name: Barbell Bench Press
                    mechanics: compound
                    force: push
                  inserted_at: "2026-02-14T10:20:00Z"
                  updated_at: "2026-02-14T10:20:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
