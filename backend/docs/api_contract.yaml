        deleted before copying (replace mode). When false, source items are
        added alongside existing target-day items (merge mode). Frontend
        pattern - trigger from copy-day dialog, pass clear_existing based on
        user choice, replace local day items with returned payload, then
        navigate to the target day tab.
      operationId: copyNutritionPlanDay
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyDayRequest"
            examples:
              replace:
                summary: Replace target day meals (default)
                value:
                  source_day: monday
                  target_day: thursday
                  clear_existing: true
              merge:
                summary: Merge with existing target day meals
                value:
                  source_day: monday
                  target_day: thursday
                  clear_existing: false
