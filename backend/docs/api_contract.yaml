    get:
      summary: Get store profile
      description: Returns the coach's storefront profile for the profile editor page. Returns null data if no profile exists yet, signalling the frontend to show the creation form. Frontend pattern - fetch on page mount, cache locally, refetch after any edit.
      operationId: getStoreProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Store profile (or null if not created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Create or update store profile
      description: Upserts the coach's storefront profile. If no profile exists, creates one (returns 201). If one exists, updates it (returns 200). Frontend pattern - single save button on the profile editor; optimistic update, reconcile with response payload.
      operationId: upsertStoreProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreProfileUpsertRequest"
            examples:
              default:
                value:
                  slug: fitness-junction
                  display_name: Fitness Junction
                  bio: Certified personal trainer with 6+ years of experience and 500+ transformations.
                  photo_url: "https://cdn.example.com/coaches/photo.jpg"
                  cover_image_url: "https://cdn.example.com/coaches/cover.jpg"
                  social_links:
                    instagram: "https://instagram.com/fitness_junction"
                    youtube: "https://youtube.com/@fitnessjunction"
                    whatsapp: "+91 98765 43210"
                  theme_color: orange
                  is_published: true
                  intake_questions:
                    - label: "Current weight?"
                      type: number
                      required: true
                    - label: "Goal?"
                      type: select
                      required: true
                      options: [Fat loss, Muscle gain, Recomposition]
      responses:
        "200":
          description: Store profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProfileResponse"
        "201":
          description: Store profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProfileResponse"
              examples:
                created:
                  value:
                    data:
                      id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      slug: fitness-junction
                      display_name: Fitness Junction
                      bio: Certified personal trainer with 6+ years of experience.
                      photo_url: "https://cdn.example.com/coaches/photo.jpg"
                      cover_image_url: "https://cdn.example.com/coaches/cover.jpg"
                      social_links:
                        instagram: "https://instagram.com/fitness_junction"
                      theme_color: orange
                      is_published: true
                      intake_questions:
                        - label: "Current weight?"
                          type: number
                          required: true
                      inserted_at: "2026-03-26T10:00:00Z"
                      updated_at: "2026-03-26T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/storefront/check-slug:
    post:
      summary: Check slug availability
      description: Checks whether a storefront slug is available for use. Frontend should call this on slug input blur or debounced keystrokes to give real-time feedback in the profile editor. Frontend pattern - debounce 300ms, show green check or red X inline.
      operationId: checkSlugAvailability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlugCheckRequest"
            examples:
              default:
                value:
                  slug: fitness-junction
      responses:
        "200":
          description: Slug availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlugCheckResponse"
              examples:
                available:
                  value:
                    available: true
                taken:
                  value:
                    available: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  # ── Offers ──────────────────────────────────────────────────
  /v1/coach/offers:
    post:
      summary: Create offer
      description: Creates a coaching offer (program/service) for the storefront. Slug is auto-generated from the name. Frontend pattern - optimistic insert into offer list, reconcile with 201 payload. Navigate to offer detail after creation.
      operationId: createOffer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferCreateRequest"
            examples:
              default:
                value:
                  name: Fat Loss Program
                  description: Comprehensive 8-week fat loss program with custom meal plans and weekly check-ins.
                  type: nutrition_plan
                  duration_text: 8 weeks
                  price: 4999
                  currency: INR
                  price_display: "₹4,999"
                  features: [Custom meal plan, Weekly check-ins, WhatsApp support]
                  is_featured: true
                  cta_text: Get started
      responses:
        "201":
          description: Offer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponse"
              examples:
                created:
                  value:
                    data:
                      id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                      name: Fat Loss Program
                      slug: fat-loss-program
                      description: Comprehensive 8-week fat loss program.
                      type: nutrition_plan
                      duration_text: 8 weeks
                      price: 4999
                      currency: INR
                      price_display: "₹4,999"
                      features: [Custom meal plan, Weekly check-ins, WhatsApp support]
                      is_featured: true
                      status: active
                      position: 0
                      cta_text: Get started
                      inserted_at: "2026-03-26T10:00:00Z"
                      updated_at: "2026-03-26T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      summary: List offers
      description: Returns all offers for the coach's business, ordered by position. Powers the offer management list in the storefront section. Frontend pattern - fetch on mount, cache locally, refetch after any create/update/delete.
      operationId: listOffers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Offers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/offers/{id}:
    get:
      summary: Get offer
      description: Returns a single offer for the edit form or detail view. Frontend pattern - cache by id, refetch after edit.
      operationId: getOffer
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Offer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update offer
      description: Updates an existing offer. Slug is auto-regenerated when name changes. Frontend pattern - optimistic update in local state, reconcile with response payload.
      operationId: updateOffer
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferUpdateRequest"
      responses:
        "200":
          description: Offer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete offer
      description: Permanently deletes an offer. Leads referencing this offer retain their offer_id but the offer data will be nil. Frontend pattern - confirm dialog, then remove from local list on 204.
      operationId: deleteOffer
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Offer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  # ── Testimonials ────────────────────────────────────────────
