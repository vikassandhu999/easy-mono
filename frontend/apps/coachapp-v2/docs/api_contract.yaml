openapi: 3.0.3
info:
  title: Easy Coaching Platform API
  version: 1.0.0
  description: API contract for the Easy Coaching Platform.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/signup:
    post:
      summary: Sign up user
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/otp:
    post:
      summary: Send OTP
      operationId: authOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/verify:
    post:
      summary: Verify OTP or token
      operationId: authVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VerifyTokenRequest"
                - $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/token:
    post:
      summary: Exchange token
      operationId: authToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TokenRefreshRequest"
                - $ref: "#/components/schemas/TokenOtpRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/businesses:
    post:
      summary: Create business
      operationId: createBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessCreateRequest"
      responses:
        "201":
          description: Business created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/businesses/me:
    get:
      summary: Get current business
      operationId: getMyBusiness
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Update current business
      operationId: updateMyBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdateRequest"
      responses:
        "200":
          description: Business updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coaches/me:
    get:
      summary: Get current coach
      operationId: getMyCoach
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coach
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Update current coach
      operationId: updateMyCoach
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachUpdateRequest"
      responses:
        "200":
          description: Coach updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients/invite:
    post:
      summary: Invite client
      description: Creates a client invitation. At least one of email or phone is required. If email is provided, an invitation email is sent automatically. If only phone is provided, the client record is created with an invite link but no email is sent — the coach shares the link manually (e.g. via WhatsApp). The response always includes invite_url for the coach to copy/share. Frontend pattern - on success show the invite_url for sharing, add the new client to the local list.
      operationId: inviteClient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInviteRequest"
            examples:
              with_email:
                value:
                  email: vikas@email.com
                  first_name: Vikas
                  last_name: Sandhu
                  phone: "+91 98765 43210"
                  notes: Interested in fat loss program
              phone_only:
                value:
                  first_name: Priya
                  phone: "+91 99999 88888"
                  notes: WhatsApp lead from Instagram
      responses:
        "201":
          description: Client invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
              examples:
                created:
                  value:
                    data:
                      id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      email: vikas@email.com
                      first_name: Vikas
                      last_name: Sandhu
                      phone: "+91 98765 43210"
                      notes: Interested in fat loss program
                      status: invited
                      invite_url: "https://app.coachapp.com/invite/abc123def456"
                      inserted_at: "2026-03-26T10:00:00Z"
                      updated_at: "2026-03-26T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients/{id}/resend-invite:
    post:
      summary: Resend invite email
      description: Re-sends the invitation email for a client with status invited and an email address. Returns 422 if the client is not in invited status or has no email. Frontend pattern - show loading state on the resend button, display success toast on 200, show error toast on 422.
      operationId: resendClientInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Invite email resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients/{id}:
    get:
      summary: Get client
      description: Returns a single client with full details. For clients with status invited, the response includes invite_url so the coach can view, copy, or share the invitation link at any time. Frontend pattern - cache by id, refetch after mutations.
      operationId: getClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update client
      description: Updates client metadata such as contact info and status. Frontend pattern - patch local form state optimistically and reconcile canonical payload from the 200 response.
      operationId: updateClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateRequest"
            examples:
              default:
                value:
                  first_name: "Jane"
                  last_name: "Doe"
                  status: active
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients:
    get:
      summary: List clients
      operationId: listClients
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/foods:
    post:
      summary: Create food
      description: Creates a reusable food entry for nutrition planning flows, typically from food-library create forms. Frontend pattern - optimistically add to current food list and reconcile details from the 201 response.
      operationId: createFood
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodCreateRequest"
            examples:
              default:
                value:
                  name: Greek Yogurt (2%)
                  macros:
                    protein: 10
                    carbs: 4
                    fats: 2
                    calories: 73
                  source: USDA
                  category: dairy
                  tags: [high-protein, breakfast]
                  notes: Plain strained yogurt.
                  image_url: "https://cdn.example.com/nutrition/foods/greek-yogurt-2pct.jpg"
                  serving_sizes:
                    - unit: cup
                      amount: 1
                      weight_g: 245
                    - unit: g
                      amount: 100
                      weight_g: 100
      responses:
        "201":
          description: Food created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
              examples:
                created:
                  value:
                    data:
                      id: 8c3ea016-df8b-4ea2-9248-aaf4c47e9a8c
                      name: Greek Yogurt (2%)
                      macros:
                        protein: 10
                        carbs: 4
                        fats: 2
                        calories: 73
                      source: USDA
                      category: dairy
                      tags: [high-protein, breakfast]
                      notes: Plain strained yogurt.
                      image_url: "https://cdn.example.com/nutrition/foods/greek-yogurt-2pct.jpg"
                      serving_sizes:
                        - unit: cup
                          amount: 1
                          weight_g: 245
                        - unit: g
                          amount: 100
                          weight_g: 100
                      creator_id: b4fd9bb4-31ba-43a4-a71a-933b57b9f8f2
                      inserted_at: "2026-02-14T10:00:00Z"
                      updated_at: "2026-02-14T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      summary: List foods
      description: Lists food-library entries for search dialogs, picker modals, and food-management tables. Frontend pattern - cache by pagination/search params and invalidate after create, update, or delete.
      operationId: listFoods
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Foods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/foods/{id}:
    get:
      summary: Get food
      description: Fetches a single food record for details pages and edit forms. Frontend pattern - cache by id and refetch after successful food mutations.
      operationId: getFood
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update food
      description: Updates food metadata used across meals and recipes when a coach edits library entries. Frontend pattern - apply optimistic field updates in the editor and rollback on validation failure.
      operationId: updateFood
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodUpdateRequest"
            examples:
              default:
                value:
                  name: Greek Yogurt (2% Milkfat)
                  category: dairy
                  tags: [high-protein, snack]
                  notes: Updated label from package.
      responses:
        "200":
          description: Food updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete food
      description: Removes a food from the custom library from destructive management actions. Frontend pattern - require confirmation, optimistically remove from local lists, and refetch if delete fails.
      operationId: deleteFood
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Food deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/coach/recipes:
    post:
      summary: Create recipe
      description: Creates a reusable recipe with ingredients for nutrition builders and meal-item composition flows. Frontend pattern - optimistically insert into recipe lists and hydrate details from the 201 payload.
      operationId: createRecipe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeCreateRequest"
            examples:
              default:
                value:
                  name: Overnight Oats Bowl
                  source: Coach Library
                  category: breakfast
                  tags: [high-fiber, make-ahead]
                  instructions: Mix and refrigerate overnight, then top and serve.
                  image_url: "https://cdn.example.com/nutrition/recipes/overnight-oats.jpg"
                  cooked_weight_g: 420
                  service_size_type: serving_based
                  serving_sizes:
                    - unit: bowl
                      amount: 1
                      weight_g: 420
                  recipe_ingredients:
                    - food_id: 8c3ea016-df8b-4ea2-9248-aaf4c47e9a8c
                      unit: g
                      amount: 200
                      weight_g: 200
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeResponse"
              examples:
                created:
                  value:
                    data:
                      id: 28d1ea76-bd7b-4f61-80f0-a3c976a9f50a
                      name: Overnight Oats Bowl
                      macros: null
                      source: Coach Library
                      category: breakfast
                      tags: [high-fiber, make-ahead]
                      instructions: Mix and refrigerate overnight, then top and serve.
                      image_url: "https://cdn.example.com/nutrition/recipes/overnight-oats.jpg"
                      cooked_weight_g: 420
                      service_size_type: serving_based
                      serving_sizes:
                        - unit: bowl
                          amount: 1
                          weight_g: 420
                      recipe_ingredients:
                        - food_id: 8c3ea016-df8b-4ea2-9248-aaf4c47e9a8c
                          food:
                            id: 8c3ea016-df8b-4ea2-9248-aaf4c47e9a8c
                            name: Greek Yogurt (2%)
                            macros:
                              protein: 10
                              carbs: 4
                              fats: 2
                              calories: 73
                            source: USDA
                            category: dairy
                            tags: [high-protein, breakfast]
                            notes: Plain strained yogurt.
                            image_url: "https://cdn.example.com/nutrition/foods/greek-yogurt-2pct.jpg"
                            serving_sizes:
                              - unit: cup
                                amount: 1
                                weight_g: 245
                            creator_id: b4fd9bb4-31ba-43a4-a71a-933b57b9f8f2
                            inserted_at: "2026-02-14T10:00:00Z"
                            updated_at: "2026-02-14T10:00:00Z"
                          unit: g
                          amount: 200
                          weight_g: 200
                      foods:
                        - id: 8c3ea016-df8b-4ea2-9248-aaf4c47e9a8c
                          name: Greek Yogurt (2%)
                          macros:
                            protein: 10
                            carbs: 4
                            fats: 2
                            calories: 73
                          source: USDA
                          category: dairy
                          tags: [high-protein, breakfast]
                          notes: Plain strained yogurt.
                          image_url: "https://cdn.example.com/nutrition/foods/greek-yogurt-2pct.jpg"
                          serving_sizes:
                            - unit: cup
                              amount: 1
                              weight_g: 245
                          creator_id: b4fd9bb4-31ba-43a4-a71a-933b57b9f8f2
                          inserted_at: "2026-02-14T10:00:00Z"
                          updated_at: "2026-02-14T10:00:00Z"
                      creator_id: b4fd9bb4-31ba-43a4-a71a-933b57b9f8f2
                      inserted_at: "2026-02-14T10:00:00Z"
                      updated_at: "2026-02-14T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      summary: List recipes
      description: Lists recipes for recipe-library screens and ingredient pickers in meal planning UX. Frontend pattern - cache by search/page key and invalidate after recipe create, update, and delete.
      operationId: listRecipes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/recipes/{id}:
    get:
      summary: Get recipe
      description: Retrieves one recipe with ingredient details for edit drawers and recipe details screens. Frontend pattern - fetch on open for editing and keep id-keyed cache in sync after save.
      operationId: getRecipe
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update recipe
      description: Persists recipe edits and ingredient changes made in recipe-builder interfaces. Frontend pattern - patch local form state optimistically and reconcile nested ingredients from response.
      operationId: updateRecipe
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdateRequest"
            examples:
              default:
                value:
                  name: Overnight Oats Bowl (Cinnamon)
                  instructions: Mix, refrigerate overnight, and top with cinnamon before serving.
                  tags: [high-fiber, make-ahead, breakfast]
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete recipe
      description: Deletes a recipe from nutrition libraries, usually from recipe-management screens. Frontend pattern - confirm destructive action, remove list row optimistically, and invalidate recipe queries.
      operationId: deleteRecipe
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Recipe deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/coach/nutrition_plans:
    post:
      summary: Create nutrition plan
      description: Creates a nutrition plan shell used as a template or client-facing plan in nutrition-programming flows. Frontend pattern - optimistically insert a new plan card and navigate to detail editor using the returned id.
      operationId: createNutritionPlan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionPlanCreateRequest"
            examples:
              default:
                value:
                  name: Lean Mass Phase 1
                  description: High-protein template with repeatable weekday structure.
                  tags: [mass-gain, high-protein]
                  macros_goal:
                    protein: 180
                    carbs: 320
                    fats: 80
                    calories: 2720
                  type: template
                  status: draft
      responses:
        "201":
          description: Nutrition plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionPlanResponse"
              examples:
                created:
                  value:
                    data:
                      id: 6d8fcaef-1d3a-46ce-8c7f-09fcbbf87f4a
                      name: Lean Mass Phase 1
                      description: High-protein template with repeatable weekday structure.
                      tags: [mass-gain, high-protein]
                      macros_goal:
                        protein: 180
                        carbs: 320
                        fats: 80
                        calories: 2720
                      type: template
                      status: draft
                      client_id: null
                      source_template_id: null
                      meals: []
                      plan_items: []
                      creator_id: b4fd9bb4-31ba-43a4-a71a-933b57b9f8f2
                      business_id: 4f4f7db6-44f5-4f31-a5aa-18d0f48e48ab
                      inserted_at: "2026-02-14T10:00:00Z"
                      updated_at: "2026-02-14T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      summary: List nutrition plans
      description: Lists nutrition plans for library tables and assignment workflows with pagination and optional status/type filtering. Frontend pattern - cache by filter key and invalidate after create, update, delete, assign, or duplicate.
      operationId: listNutritionPlans
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: client_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Nutrition plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionPlanListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/nutrition_plans/{id}:
    get:
      summary: Get nutrition plan
      description: Returns one nutrition plan with nested meals and plan items for full plan-builder hydration. Frontend pattern - treat this endpoint as source of truth for the nutrition plan detail screen.
      operationId: getNutritionPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Nutrition plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update nutrition plan
