openapi: 3.0.3
info:
  title: Easy Coaching Platform API
  version: 1.0.0
  description: API contract for the Easy Coaching Platform.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/signup:
    post:
      summary: Sign up user
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/otp:
    post:
      summary: Send OTP
      operationId: authOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/verify:
    post:
      summary: Verify OTP or token
      operationId: authVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VerifyTokenRequest"
                - $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/token:
    post:
      summary: Exchange token
      operationId: authToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TokenRefreshRequest"
                - $ref: "#/components/schemas/TokenOtpRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/invitations/{token}:
    get:
      summary: Look up an invitation by token
      description: >-
        Public, unauthenticated endpoint called by the invitation landing page to
        render the welcome screen and detect the invitation's current state.
        Always returns HTTP 200 — the frontend switches on `data.state`
        (pending | used | expired | invalid). For `pending`, `business_name`,
        `coach_first_name`, `prefill_email`, and `expires_at` are included so the
        frontend can show "Coach Rajat has invited you" and pre-fill the email
        input. For the other three states, only `state` is returned (no
        business/coach leak). Frontend pattern - call from the /invite/:token
        landing route before showing the form; render different UI per state.
      operationId: authShowInvitation
      parameters:
        - name: token
          in: path
          required: true
          description: The raw invitation token from the invite URL.
          schema:
            type: string
      responses:
        "200":
          description: Invitation lookup result (state-discriminated body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationLookupResponse"
              examples:
                pending:
                  summary: Valid pending invitation
                  value:
                    data:
                      state: pending
                      business_name: FitCoach Pro
                      coach_first_name: Rajat
                      prefill_email: vikas@email.com
                      expires_at: "2026-04-25T10:00:00Z"
                pending_no_email:
                  summary: Pending invitation where coach did not enter an email
                  value:
                    data:
                      state: pending
                      business_name: FitCoach Pro
                      coach_first_name: Rajat
                      prefill_email: null
                      expires_at: "2026-04-25T10:00:00Z"
                used:
                  summary: Invitation already accepted
                  value:
                    data:
                      state: used
                expired:
                  summary: Invitation older than 30 days
                  value:
                    data:
                      state: expired
                invalid:
                  summary: Token unknown or revoked
                  value:
                    data:
                      state: invalid
  /v1/auth/accept-invite:
    post:
      summary: Request invitation-acceptance OTP
      description: >-
        Phase 1 of the two-step invitation acceptance flow. Validates the
        invitation token is pending & unexpired, then mails a 6-digit OTP to the
        supplied email. **No Client or User mutation happens here** — the Client
        stays pending and no User is created or linked. The caller completes the
        flow by posting the OTP plus the same `invitation_token` and `email` to
        POST /v1/auth/accept-invite/verify. The OTP is bound to the tuple
        `(otp, email, invitation_token)` — it cannot be used to accept a
        different invitation or with a different email. Re-posting this endpoint
        for the same email invalidates any prior invitation-acceptance OTP for
        that email and issues a fresh one. Frontend pattern - call from the
        invitation landing page after the client enters their email on Screen 1;
        on 200 navigate to the OTP entry screen (Screen 2).
      operationId: authAcceptInviteRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
            examples:
              default:
                value:
                  invitation_token: abc123def456
                  email: client@example.com
      responses:
        "200":
          description: OTP sent to the supplied email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: OTP sent to the provided email.
        "404":
          description: Invitation not found (token does not match any record)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error_code: invitation_invalid
                error_message: This invitation is no longer valid.
        "410":
          description: Invitation has been used or has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                used:
                  value:
                    error_code: invitation_used
                    error_message: This invitation has already been accepted.
                expired:
                  value:
                    error_code: invitation_expired
                    error_message: This invitation has expired. Ask your coach to send a new one.
  /v1/auth/accept-invite/verify:
    post:
      summary: Verify invitation-acceptance OTP and issue a client session
      description: >-
        Phase 2 of the invitation acceptance flow. Verifies the OTP bound to
        `(otp, email, invitation_token)`. On success, atomically creates or
        links the User (confirming their email as a side effect), flips the
        Client from pending to active with the accepted email, consumes the
        OTP, and issues a session scoped to the client's business with
        `scope: "client"`. If the OTP is wrong the Client remains pending and
        the caller can retry (same OTP until expiry). Frontend pattern - call
        from the OTP entry screen; on 200 store the returned tokens and route
        into the authenticated client app. The `scope=client` access token is
        accepted by all `/v1/client/*` endpoints.
      operationId: authAcceptInviteVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteVerifyRequest"
            examples:
              default:
                value:
                  invitation_token: abc123def456
                  email: client@example.com
                  otp: "472819"
      responses:
        "200":
          description: OTP verified, Client linked & activated, session issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                token_type: Bearer
                expires_in: 300
                refresh_token: 4f1c8a7e-c2b4-4d3a-9b0e-1f2a3b4c5d6e
                scope: client
        "401":
          description: OTP is incorrect, does not match the supplied (email, invitation_token) tuple, or was consumed on a prior successful verify.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error_code: invalid_otp
                error_message: Invalid code. Please check and try again.
        "404":
          description: Invitation token is unknown (possibly revoked).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error_code: invitation_invalid
                error_message: This invitation is no longer valid.
        "409":
          description: The email is already an active client of another business (MVP one-active-client-per-User invariant).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error_code: already_active_client
                error_message: This email is already an active client of another business.
        "410":
          description: OTP expired (older than 10 minutes), invitation expired (older than 30 days), or invitation already accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                otp_expired:
                  value:
                    error_code: otp_expired
                    error_message: This code has expired. Request a new one.
                invitation_expired:
                  value:
                    error_code: invitation_expired
                    error_message: This invitation has expired. Ask your coach to send a new one.
                invitation_used:
                  value:
                    error_code: invitation_used
                    error_message: This invitation has already been accepted.
  # ── Client Endpoints ─────────────────────────────────────────
  /v1/client/me:
    get:
      summary: Get client profile
      description: >-
        Returns the authenticated client's own profile including their coach's
        contact information. Used by the client settings page. Frontend pattern —
        fetch on app launch and cache locally; refetch after profile updates.
      operationId: getClientProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client profile with coach info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileResponse"
              example:
                data:
                  id: 9e55e6ef-bb98-45ec-bff7-56339e4ac4f7
                  first_name: Vikas
                  last_name: Kumar
                  email: vikas@email.com
                  phone: "+91 98765 43210"
                  status: active
                  coach:
                    first_name: Rajat
                    last_name: Jain
                    phone: "+91 99999 12345"
                    business_name: FitCoach Pro
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires client role
    patch:
      summary: Update client profile
      description: >-
        Allows the client to update their own name and phone number. Email and
        status are not client-editable. Used by the client settings page inline
        edit rows. Frontend pattern — optimistic update on the cached profile,
        refetch on error.
      operationId: updateClientProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileUpdateRequest"
            examples:
              default:
                value:
                  first_name: Vikas
                  last_name: Kumar
                  phone: "+91 98765 43210"
      responses:
        "200":
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires client role
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/training_plans:
    get:
      summary: List my training plans
      description: >-
        Returns training plans assigned to the authenticated client. Only non-template
        plans scoped to this client are returned. Response includes rest_days array
        for the four-state today card: workout day, rest day, empty day (no workout,
        not rest), or no plan. Frontend pattern - fetch on app launch, match today's
        weekday against planned_workouts.day_number and rest_days to determine the
        today card state. Cache with tag 'TrainingPlan'; refetch on app resume.
      operationId: listClientTrainingPlans
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of assigned training plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTrainingPlanListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden - requires client role

  /v1/client/training_plans/today:
    get:
      summary: Get today's training view
      description: >-
        Single aggregate endpoint that powers the Today screen (client UX spec, Surface 1).
        Returns everything the Today card needs in one call: personal greeting, coaching
        context (week number with coach, coach first name), today's state
        (workout / rest / empty / no_plan), the planned workout for today with full
        exercise tree, the coach's motivational note for the active plan, a recap of the
        client's previous session of the same workout ("Last time: Bench Press 80kg \u00d7 9"),
        the this-week strip with per-day state (done/upcoming/rest/empty + is_today flag),
        and a compact plan summary. Frontend pattern - fetch on app launch and whenever
        the Today screen is focused; this is the primary retention surface. Never 404s -
        a client with no active plan receives `today.kind = "no_plan"` and an empty
        this_week. Accepts optional `?date=YYYY-MM-DD` for testing and for clients in
        non-UTC timezones; defaults to today UTC.
      operationId: getClientTodayTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: ISO 8601 date to resolve the Today view against. Defaults to today (UTC).
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Aggregated Today view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTodayResponse"
              examples:
                workout_day:
                  value:
                    data:
                      greeting:
                        first_name: Vikas
                        day_name: Monday
                        date: "2026-04-13"
                      coaching_context:
                        coach_first_name: Rajat
                        week_number: 6
                      today:
                        kind: workout
                        coach_note: Push hard on bench this week.
                        planned_workout:
                          id: 3a2f8c27-5ab0-4ea4-b7e1-7b8a34f1c012
                          name: Push Day
                          day_number: 1
                          notes: null
                          exercise_count: 5
                          workout_elements: []
                        last_session_recap:
                          session_id: 9a1b2c3d-1111-2222-3333-4444aaaabbbb
                          ended_at: "2026-04-06T09:00:00Z"
                          headline: "Bench Press 80.0kg \u00d7 9"
                      this_week:
                        - day_number: 1
                          day_name: Monday
                          date: "2026-04-13"
                          is_today: true
                          kind: upcoming
                          planned_workout_name: Push Day
                          session_id: null
                      plan:
                        id: 8c1f6e22-ffff-4444-aaaa-bbbbccccdddd
                        name: 12-Week Strength Base
                        start_date: "2026-03-09"
                        end_date: "2026-06-01"
                no_plan:
                  value:
                    data:
                      greeting:
                        first_name: Vikas
                        day_name: Monday
                        date: "2026-04-13"
                      coaching_context:
                        coach_first_name: Rajat
                        week_number: null
                      today:
                        kind: no_plan
                        coach_note: null
                        planned_workout: null
                        last_session_recap: null
                      this_week: []
                      plan: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden - requires client role

  /v1/client/training_plans/{id}:
    get:
      summary: Get training plan detail
      description: >-
        Returns a single training plan with full preloaded tree: planned workouts,
        workout elements (with exercise details and images), planned sets, and
        rest_days. This is the data source for rendering the client's workout
        program and weekly preview strip. Frontend pattern - fetch when client
        opens plan detail or starts a workout; use rest_days to show "Rest Day"
        on the today card and weekly strip for coach-designated rest days.
      operationId: getClientTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Training plan with full detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTrainingPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/exercises:
    get:
      summary: Search exercises
      description: >-
        Returns exercises available to the client's business (business-created +
        system exercises). Used during workout logging for the replace-exercise
        picker and the add-unplanned-exercise flow. Supports search by name and
        filter by muscle_ids. Frontend pattern - use as an infinite query with
        search debounce; cache with tag 'Exercise'.
      operationId: listClientExercises
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: muscle_ids
          in: query
          description: Comma-separated muscle UUIDs
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated exercise list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientExerciseListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/exercises/{id}:
    get:
      summary: Get exercise detail
      description: >-
        Returns a single exercise with muscles and equipment. Used when the client
        taps an exercise to see instructions, images, and muscle info.
      operationId: getClientExercise
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exercise detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientExerciseResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions:
    get:
      summary: List my workout sessions
      description: >-
        Returns the client's own workout sessions. Supports state filter and
        pagination. Used for the workout history list. Frontend pattern - infinite
        query sorted by newest; cache with tag 'WorkoutSession'.
      operationId: listClientWorkoutSessions
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [active, completed, discarded]
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Start a workout session
      description: >-
        Creates a new active workout session. If planned_workout_id is provided,
        a planned_snapshot is captured at creation time for change-resilient
        comparison. Only one active session per client is allowed — returns 422
        if an active session already exists. The response includes
        `last_performed_by_element`, a map keyed by planned element id containing
        the client's previous performance for each exercise slot (UX spec Surface
        2.1 "Last time" comparison). Frontend pattern - call when client taps
        "Start workout"; on success navigate to the active workout screen and
        use `last_performed_by_element` to render "Last time: 9 reps @ 80kg"
        under each set. Invalidate WorkoutSession list cache.
      operationId: createClientWorkoutSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientStartSessionRequest"
            examples:
              planned:
                value:
                  planned_workout_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              freestyle:
                value: {}
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/workout_sessions/active:
    get:
      summary: Get active session
      description: >-
        Returns the client's current active workout session (if any), or 404 if
        none. Used on app launch to detect and resume an interrupted workout. The
        response includes `last_performed_by_element` so the resume screen can
        immediately show "Last time" under every exercise without a second call.
        Frontend pattern - call on app foreground; if 200, navigate directly to
        the active workout screen with the returned session data.
      operationId: getClientActiveSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No active session

  /v1/client/workout_sessions/{id}:
    get:
      summary: Get workout session detail
      description: >-
        Returns a single workout session with all performed sets and exercise
        preloads, plus `last_performed_by_element` (map of planned element id to
        prior performance) so the active workout view can display "Last time"
        comparisons. Used to display a workout in the history view or as the
        source of truth for the active workout screen.
      operationId: getClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update workout session
      description: >-
        Updates notes and/or soreness_rating on a session. Used when the client
        edits session notes during or after a workout.
      operationId: updateClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions/{id}/complete:
    post:
      summary: Complete workout
      description: >-
        Transitions session to completed state. Server auto-sets ended_at.
        Accepts optional soreness_rating (1-5), mood emoji (tough/solid/strong),
        and notes (the "Note for Coach" field from UX spec Surface 3). The
        response includes a `summary` block with duration_minutes, sets_count,
        total_volume_kg, volume_delta_kg vs the previous session of the same
        planned workout, and prs (empty array for launch; PR detection is
        nice-to-have). Frontend pattern - call when client taps "Send to Coach
        Rajat"; render the celebration screen directly from the response summary
        without a second round-trip. Invalidate WorkoutSession list cache.
      operationId: completeClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientCompleteSessionRequest"
            examples:
              with_mood:
                value:
                  mood: solid
                  notes: "Bench felt amazing today, tried 85kg"
              legacy:
                value:
                  soreness_rating: 4
                  notes: "Great session, PR on bench!"
      responses:
        "200":
          description: >-
            Session completed. The response includes the full session data plus a
            `summary` object with the workout completion celebration data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionCompleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions/{id}/discard:
    post:
      summary: Discard workout
      description: >-
        Transitions session to discarded state (soft delete). Used when the
        client abandons a workout. Frontend pattern - call from a "Discard"
        option in the active workout menu. Invalidate WorkoutSession list cache.
      operationId: discardClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session discarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/performed_sets:
    post:
      summary: Log a set
      description: >-
        Creates a performed set within the client's active workout session.
        Links to exercise_id (required) and optionally workout_element_id for
        planned exercise slots. Position is a global counter across all exercises
        in the session. Frontend pattern - call after client taps "Log set" or
        the one-tap checkbox; optimistically add the set to local state, rollback
        on error. Invalidate the parent WorkoutSession cache to refetch with the
        new set.
      operationId: createClientPerformedSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientLogSetRequest"
            example:
              workout_session_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              exercise_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
              workout_element_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
              position: 0
              actual_reps: "10"
              load_value: 80
              load_unit: kg
              completed: true
      responses:
        "201":
          description: Set logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPerformedSetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/performed_sets/{id}:
    patch:
      summary: Update a logged set
      description: >-
        Updates any fields on a performed set. Used when the client edits a
        previously logged set (e.g., correcting reps or load). Frontend pattern -
        optimistic update, rollback on error.
      operationId: updateClientPerformedSet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateSetRequest"
      responses:
        "200":
          description: Set updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPerformedSetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete a logged set
      description: >-
        Removes a performed set. Used when the client wants to undo a logged set.
        Frontend pattern - optimistic removal from local state, rollback on error.
      operationId: deleteClientPerformedSet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Set deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Client Nutrition ──────────────────────────────────────
  /v1/client/nutrition_plans:
    get:
      summary: List my nutrition plans
      description: >-
        Returns nutrition plans assigned to the authenticated client. Only personal
        (non-template) plans scoped to this client are returned. The index response
        is lightweight — no meals or plan_items included. Use the detail endpoint
        for full plan data. Frontend pattern — fetch on nutrition tab load, display
        plan cards.
      operationId: listClientNutritionPlans
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of assigned nutrition plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientNutritionPlanListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/nutrition_plans/today:
    get:
      summary: Get today's planned meals with nutrition summary
      description: >-
        Resolves the client's active nutrition plan for a given date (defaults to today),
        determines the weekday, and returns all planned meals for that day with full food/recipe
        detail. The response now includes a `nutrition_summary` block with per-macro
        actual vs target comparison and a motivational headline (UX spec Surface 4.1:
        "Crushing protein" / "X cal under target" / "On point today"). Actual macros are
        derived from logged food_log_entries for the date. Returns 404 if no active plan
        exists or the plan's date range does not cover the requested date. Frontend
        pattern — primary data source for the daily nutrition view. Call on nutrition tab
        open and when swiping between days.
      operationId: getClientTodayPlan
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          description: ISO date to resolve meals for (defaults to today)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Today's planned meals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTodayPlanResponse"
              example:
                data:
                  date: "2026-03-25"
                  day: monday
                  plan_id: "a1b2c3d4-..."
                  meals:
                    - meal_slot: breakfast
                      meal_id: "m1..."
                      meal_name: Breakfast
                      items:
                        - meal_item_id: "mi1..."
                          food_id: "f1..."
                          food_name: Oats
                          amount: 100
                          unit: g
                          weight_g: 100
                          macros: { calories_per_100g: 389, protein_g: 16.9, carbs_g: 66.3, fat_g: 6.9 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/nutrition_plans/{id}:
    get:
      summary: Get nutrition plan detail
      description: >-
        Returns a single nutrition plan with full preloaded tree — meals with meal items
        (including nested food/recipe name + macros + serving sizes) and plan items (weekly
        schedule). Frontend pattern — call when user taps into a plan, cache for offline viewing.
      operationId: getClientNutritionPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Nutrition plan with full detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientNutritionPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/foods:
    get:
      summary: Search foods
      description: >-
        Search foods available to the client — includes system foods and the coach's
        business foods. Supports full-text search via the search param. When search is
        active, results are ordered by relevance; otherwise by newest. Frontend pattern —
        powers the food picker when logging unplanned food or replacing a planned item.
      operationId: listClientFoods
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of foods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFoodListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/foods/{id}:
    get:
      summary: Get food detail
      description: >-
        Returns a single food with macros and serving sizes. Frontend pattern — call
        when user selects a food from search results to show detail before logging.
      operationId: getClientFood
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Food detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFoodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/recipes:
    get:
      summary: Search recipes
      description: >-
        Search recipes created by the coach for this business. Supports name search.
        Frontend pattern — powers the recipe picker when logging food.
      operationId: listClientRecipes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRecipeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/recipes/{id}:
    get:
      summary: Get recipe detail
      description: >-
        Returns a single recipe with ingredients (each with nested food detail).
        Frontend pattern — call when user selects a recipe to view before logging.
      operationId: getClientRecipe
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRecipeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/meal_logs:
    get:
      summary: List my meal logs
      description: >-
        Returns the client's meal logs with nested food_log_entries. Each MealLog represents
        one meal slot on one day (e.g. breakfast on Monday). Contains planned_snapshot (frozen
        at first log time) for plan vs done comparison. Use date param to filter to a single
        day. Frontend pattern -- fetch on daily nutrition view, use planned_snapshot.items +
        food_log_entries to render logged/skipped/replaced indicators.
      operationId: listClientMealLogs
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          description: Filter to a single date (ISO format)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of meal logs with entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMealLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/meal_logs/{id}:
    get:
      summary: Get a meal log
      description: >-
        Returns a single meal log with all food_log_entries. Frontend pattern -- use
        for drill-down from daily view to see full entry details for a meal slot.
      operationId: getClientMealLog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Meal log with entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMealLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/food_log_entries:
    post:
      summary: Log a single food item
      description: >-
        Creates a FoodLogEntry. Server finds or creates MealLog for (date, meal_slot),
        building planned_snapshot from active plan if new. Computes final macros from
        food/recipe and weight_g. Auto-fills food_name from food/recipe if not provided.
        Updates MealLog.logged_calories. Frontend pattern -- call on single-item log,
        then refetch meal_logs for the date or optimistically update.
      operationId: createFoodLogEntry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFoodLogEntryRequest"
            example:
              date: "2026-03-25"
              meal_slot: breakfast
              food_id: "f1..."
              food_name: Oats
              amount: 100
              unit: g
              weight_g: 100
              source: planned
              planned_item_index: 0
      responses:
        "201":
          description: Food log entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodLogEntryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/food_log_entries/log_meal:
    post:
      summary: Log all items in a meal
      description: >-
        Bulk-logs all unlogged items in a meal for a given date and meal slot. Finds or
        creates MealLog (with planned_snapshot). Checks which planned_item_index values
        already have entries and skips those. Returns only newly created entries. All
        entries get source "planned". Frontend pattern -- powers "Log all" button per
        meal slot. After success, refetch meal_logs for the date.
      operationId: clientLogMeal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientLogMealRequest"
            example:
              date: "2026-03-25"
              meal_slot: breakfast
              meal_id: "m1..."
      responses:
        "201":
          description: Newly created food log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodLogEntryBulkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/food_log_entries/log_day:
    post:
      summary: Log all meals for a day
      description: >-
        Bulk-logs all unlogged items across all meals scheduled for a given date from a plan.
        Resolves the weekday from the date, finds all plan_items for that day, and calls
        log_meal for each. Already-logged items are skipped. Frontend pattern -- powers the
        "Log all meals" button at the bottom of the daily view.
      operationId: clientLogDay
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientLogDayRequest"
            example:
              date: "2026-03-25"
              plan_id: "p1..."
      responses:
        "201":
          description: All newly created food log entries for the day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodLogEntryBulkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/food_log_entries/{id}:
    patch:
      summary: Update a food log entry
      description: >-
        Updates amount, unit, weight_g, or notes on an existing entry. If weight_g
        changes, server recomputes macros from the linked food/recipe. Updates
        MealLog.logged_calories. Frontend pattern -- call when user adjusts portion
        size. Refetch meal_logs or optimistically update macros.
      operationId: updateFoodLogEntry
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFoodLogEntryRequest"
      responses:
        "200":
          description: Updated food log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodLogEntryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a food log entry
      description: >-
        Removes a food log entry. Updates MealLog.logged_calories. If the entry was
        a planned item, the slot reverts to unlogged. Frontend pattern -- call when
        user removes a logged item, then update local state.
      operationId: deleteFoodLogEntry
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Food log entry deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/businesses:
    post:
      summary: Create business
      operationId: createBusiness
      security:
        - bearerAuth: []
      requestBody:
