        status:
          type: string
          enum: [active, archived]
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        rest_days:
          type: array
          description: Weekday numbers (1=Mon..7=Sun) marked as rest days. Used by client app to distinguish rest days from empty days.
          items:
            type: integer
