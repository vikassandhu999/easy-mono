openapi: 3.0.3
info:
  title: Easy Coaching Platform API
  version: 1.0.0
  description: API contract for the Easy Coaching Platform.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/signup:
    post:
      summary: Sign up user
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/otp:
    post:
      summary: Send OTP
      operationId: authOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/verify:
    post:
      summary: Verify OTP or token
      operationId: authVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VerifyTokenRequest"
                - $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/token:
    post:
      summary: Exchange token
      operationId: authToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TokenRefreshRequest"
                - $ref: "#/components/schemas/TokenOtpRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/auth/accept-invite:
    post:
      summary: Accept client invitation
      description: >-
        Called when a client clicks their invitation link. Accepts the invitation token,
        creates a User account (or links to an existing one if the email matches),
        links the client record to the user, sets client status to active, and sends
        an email confirmation OTP. The client must then verify their email via
        POST /v1/auth/verify and login via POST /v1/auth/token with role=client.
        Frontend pattern - call from the invitation landing page; on success, redirect
        to OTP verification screen.
      operationId: authAcceptInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
            examples:
              default:
                value:
                  invitation_token: abc123def456
                  email: client@example.com
      responses:
        "201":
          description: Invitation accepted and user account created/linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResponse"
              example:
                id: 9e55e6ef-bb98-45ec-bff7-56339e4ac4f7
                email: client@example.com
                first_name: Vikas
                last_name: Sandhu
                email_confirmed: false
                confirmation_sent_at: "2026-03-28T10:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  # ── Client Endpoints ─────────────────────────────────────────
  /v1/client/me:
    get:
      summary: Get client profile
      description: >-
        Returns the authenticated client's own profile including their coach's
        contact information. Used by the client settings page. Frontend pattern —
        fetch on app launch and cache locally; refetch after profile updates.
      operationId: getClientProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client profile with coach info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileResponse"
              example:
                data:
                  id: 9e55e6ef-bb98-45ec-bff7-56339e4ac4f7
                  first_name: Vikas
                  last_name: Kumar
                  email: vikas@email.com
                  phone: "+91 98765 43210"
                  status: active
                  coach:
                    first_name: Rajat
                    last_name: Jain
                    phone: "+91 99999 12345"
                    business_name: FitCoach Pro
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires client role
    patch:
      summary: Update client profile
      description: >-
        Allows the client to update their own name and phone number. Email and
        status are not client-editable. Used by the client settings page inline
        edit rows. Frontend pattern — optimistic update on the cached profile,
        refetch on error.
      operationId: updateClientProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileUpdateRequest"
            examples:
              default:
                value:
                  first_name: Vikas
                  last_name: Kumar
                  phone: "+91 98765 43210"
      responses:
        "200":
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires client role
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/training_plans:
    get:
      summary: List my training plans
      description: >-
        Returns training plans assigned to the authenticated client. Only non-template
        plans scoped to this client are returned. Frontend pattern - fetch on app launch
        to show the client's current program; supports status filter and pagination.
        Cache with tag 'TrainingPlan'; no client-side mutations so cache only invalidates
        on coach actions (which the client app doesn't see — refetch on app resume).
      operationId: listClientTrainingPlans
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of assigned training plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTrainingPlanListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden - requires client role

  /v1/client/training_plans/{id}:
    get:
      summary: Get training plan detail
      description: >-
        Returns a single training plan with full preloaded tree: planned workouts,
        workout elements (with exercise details and images), and planned sets.
        This is the data source for rendering the client's workout program.
        Frontend pattern - fetch when client opens plan detail or starts a workout
        to display planned exercises and set schemes.
      operationId: getClientTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Training plan with full detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTrainingPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/exercises:
    get:
      summary: Search exercises
      description: >-
        Returns exercises available to the client's business (business-created +
        system exercises). Used during workout logging for the replace-exercise
        picker and the add-unplanned-exercise flow. Supports search by name and
        filter by muscle_ids. Frontend pattern - use as an infinite query with
        search debounce; cache with tag 'Exercise'.
      operationId: listClientExercises
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: muscle_ids
          in: query
          description: Comma-separated muscle UUIDs
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated exercise list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientExerciseListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/exercises/{id}:
    get:
      summary: Get exercise detail
      description: >-
        Returns a single exercise with muscles and equipment. Used when the client
        taps an exercise to see instructions, images, and muscle info.
      operationId: getClientExercise
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exercise detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientExerciseResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions:
    get:
      summary: List my workout sessions
      description: >-
        Returns the client's own workout sessions. Supports state filter and
        pagination. Used for the workout history list. Frontend pattern - infinite
        query sorted by newest; cache with tag 'WorkoutSession'.
      operationId: listClientWorkoutSessions
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [active, completed, discarded]
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Start a workout session
      description: >-
        Creates a new active workout session. If planned_workout_id is provided,
        a planned_snapshot is captured at creation time for change-resilient
        comparison. Only one active session per client is allowed — returns 422
        if an active session already exists. Frontend pattern - call when client
        taps "Start workout"; on success navigate to the active workout screen.
        Invalidate WorkoutSession list cache.
      operationId: createClientWorkoutSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientStartSessionRequest"
            examples:
              planned:
                value:
                  planned_workout_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              freestyle:
                value: {}
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/workout_sessions/active:
    get:
      summary: Get active session
      description: >-
        Returns the client's current active workout session (if any), or 404 if
        none. Used on app launch to detect and resume an interrupted workout.
        Frontend pattern - call on app foreground; if 200, navigate directly to
        the active workout screen with the returned session data.
      operationId: getClientActiveSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No active session

  /v1/client/workout_sessions/{id}:
    get:
      summary: Get workout session detail
      description: >-
        Returns a single workout session with all performed sets and exercise
        preloads. Used to display a completed workout in the history view.
      operationId: getClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update workout session
      description: >-
        Updates notes and/or soreness_rating on a session. Used when the client
        edits session notes during or after a workout.
      operationId: updateClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions/{id}/complete:
    post:
      summary: Complete workout
      description: >-
        Transitions session to completed state. Server auto-sets ended_at.
        Accepts optional soreness_rating (1-5) and notes. Frontend pattern -
        call when client taps "Complete workout" on the finish summary screen.
        Invalidate WorkoutSession list + this session's cache.
      operationId: completeClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientCompleteSessionRequest"
            example:
              soreness_rating: 4
              notes: "Great session, PR on bench!"
      responses:
        "200":
          description: Session completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/workout_sessions/{id}/discard:
    post:
      summary: Discard workout
      description: >-
        Transitions session to discarded state (soft delete). Used when the
        client abandons a workout. Frontend pattern - call from a "Discard"
        option in the active workout menu. Invalidate WorkoutSession list cache.
      operationId: discardClientWorkoutSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session discarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/performed_sets:
    post:
      summary: Log a set
      description: >-
        Creates a performed set within the client's active workout session.
        Links to exercise_id (required) and optionally workout_element_id for
        planned exercise slots. Position is a global counter across all exercises
        in the session. Frontend pattern - call after client taps "Log set" or
        the one-tap checkbox; optimistically add the set to local state, rollback
        on error. Invalidate the parent WorkoutSession cache to refetch with the
        new set.
      operationId: createClientPerformedSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientLogSetRequest"
            example:
              workout_session_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              exercise_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
              workout_element_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
              position: 0
              actual_reps: "10"
              load_value: 80
              load_unit: kg
              completed: true
      responses:
        "201":
          description: Set logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPerformedSetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/client/performed_sets/{id}:
    patch:
      summary: Update a logged set
      description: >-
        Updates any fields on a performed set. Used when the client edits a
        previously logged set (e.g., correcting reps or load). Frontend pattern -
        optimistic update, rollback on error.
      operationId: updateClientPerformedSet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateSetRequest"
      responses:
        "200":
          description: Set updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPerformedSetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete a logged set
      description: >-
        Removes a performed set. Used when the client wants to undo a logged set.
        Frontend pattern - optimistic removal from local state, rollback on error.
      operationId: deleteClientPerformedSet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Set deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Client Nutrition ──────────────────────────────────────
  /v1/client/nutrition_plans:
    get:
      summary: List my nutrition plans
      description: >-
        Returns nutrition plans assigned to the authenticated client. Only personal
        (non-template) plans scoped to this client are returned. The index response
        is lightweight — no meals or plan_items included. Use the detail endpoint
        for full plan data. Frontend pattern — fetch on nutrition tab load, display
        plan cards.
      operationId: listClientNutritionPlans
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of assigned nutrition plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientNutritionPlanListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/nutrition_plans/today:
    get:
      summary: Get today's planned meals
      description: >-
        Resolves the client's active nutrition plan for a given date (defaults to today),
        determines the weekday, and returns all planned meals for that day with full food/recipe
        detail. Returns 404 if no active plan exists or the plan's date range does not cover the
        requested date. Frontend pattern — primary data source for the daily nutrition view. Call
        on nutrition tab open and when swiping between days.
      operationId: getClientTodayPlan
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          description: ISO date to resolve meals for (defaults to today)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Today's planned meals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTodayPlanResponse"
              example:
                data:
                  date: "2026-03-25"
                  day: monday
                  plan_id: "a1b2c3d4-..."
                  meals:
                    - meal_slot: breakfast
                      meal_id: "m1..."
                      meal_name: Breakfast
                      items:
                        - meal_item_id: "mi1..."
                          food_id: "f1..."
                          food_name: Oats
                          amount: 100
                          unit: g
                          weight_g: 100
                          macros: { calories_per_100g: 389, protein_g: 16.9, carbs_g: 66.3, fat_g: 6.9 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/nutrition_plans/{id}:
    get:
      summary: Get nutrition plan detail
      description: >-
        Returns a single nutrition plan with full preloaded tree — meals with meal items
        (including nested food/recipe name + macros + serving sizes) and plan items (weekly
        schedule). Frontend pattern — call when user taps into a plan, cache for offline viewing.
      operationId: getClientNutritionPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Nutrition plan with full detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientNutritionPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/foods:
    get:
      summary: Search foods
      description: >-
        Search foods available to the client — includes system foods and the coach's
        business foods. Supports full-text search via the search param. When search is
        active, results are ordered by relevance; otherwise by newest. Frontend pattern —
        powers the food picker when logging unplanned food or replacing a planned item.
      operationId: listClientFoods
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of foods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFoodListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/foods/{id}:
    get:
      summary: Get food detail
      description: >-
        Returns a single food with macros and serving sizes. Frontend pattern — call
        when user selects a food from search results to show detail before logging.
      operationId: getClientFood
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Food detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFoodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/recipes:
    get:
      summary: Search recipes
      description: >-
        Search recipes created by the coach for this business. Supports name search.
        Frontend pattern — powers the recipe picker when logging food.
      operationId: listClientRecipes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRecipeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/client/recipes/{id}:
    get:
      summary: Get recipe detail
      description: >-
        Returns a single recipe with ingredients (each with nested food detail).
        Frontend pattern — call when user selects a recipe to view before logging.
      operationId: getClientRecipe
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRecipeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/client/meal_logs:
    get:
      summary: List my meal logs
      description: >-
        Returns the client's meal logs with nested food_log_entries. Each MealLog represents
        one meal slot on one day (e.g. breakfast on Monday). Contains planned_snapshot (frozen
        at first log time) for plan vs done comparison. Use date param to filter to a single
        day. Frontend pattern -- fetch on daily nutrition view, use planned_snapshot.items +
        food_log_entries to render logged/skipped/replaced indicators.
      operationId: listClientMealLogs
      security:
        - bearerAuth: []
