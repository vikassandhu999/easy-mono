<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoachEasy Dashboard Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --app-bg: oklch(0.9702 0 0);
        --surface: oklch(1 0 0);
        --text: oklch(0.2103 0.0059 285.89);
        --muted: oklch(0.5517 0.0138 285.94);
        --border: oklch(0.9 0.004 286.32);
        --separator: oklch(0.92 0.004 286.32);
        --active: oklch(0.6204 0.195 253.83);
        --active-bg: oklab(0.6204 -0.0543052 -0.187286 / 0.1);
      }

      * { box-sizing: border-box; }

      html,
      body { margin: 0; width: 100%; height: 100%; }

      body {
        overflow: hidden;
        background: var(--app-bg);
        color: #000;
        font-family: "Inter", "Inter Variable", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 24px;
      }

      button,
      a {
        font: inherit;
        color: inherit;
      }

      button {
        appearance: none;
        border: 0;
        background: transparent;
        cursor: default;
      }

      a { text-decoration: none; }

      .app-shell {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--app-bg);
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        display: flex;
        flex-direction: column;
        width: 256px;
        height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
      }

      .logo-row {
        height: 64px;
        padding: 0 24px;
        display: flex;
        align-items: center;
      }

      .logo {
        display: block;
        width: 154.297px;
        height: 28px;
      }

      .sidebar-nav {
        display: flex;
        flex: 1;
        flex-direction: column;
        padding: 16px 12px;
      }

      .nav-top { flex: 1; }

      .nav-item,
      .group-toggle,
      .sub-item,
      .settings-link {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        color: var(--muted);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        text-align: left;
      }

      .nav-item,
      .settings-link {
        min-height: 44px;
        height: 44px;
        padding: 10px 12px;
        gap: 12px;
      }

      .nav-item { margin-bottom: 4px; }

      .nav-item.active {
        color: var(--active);
        background: var(--active-bg);
        font-weight: 600;
      }

      .icon {
        display: block;
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .icon-sm {
        display: block;
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        margin: 4px -2px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .nav-label { flex: 1; }

      .group-toggle {
        height: 44px;
        min-height: 44px;
        padding: 10px 12px;
        gap: 12px;
      }

      .chevron-down { rotate: 90deg; }

      .sub-menu {
        width: calc(100% - 12px);
        height: 274px;
        margin-top: 4px;
        margin-left: 12px;
        border-left: 1px solid var(--border);
      }

      .sub-item {
        width: calc(100% - 12px);
        height: 44px;
        min-height: 44px;
        margin-left: 12px;
        margin-bottom: 2px;
        padding: 8px 12px;
        gap: 12px;
      }

      .sub-item:last-child { margin-bottom: 0; }

      .separator {
        width: 100%;
        height: 1px;
        margin: 8px 0;
        border: 0;
        border-radius: 4px;
        background: var(--separator);
      }

      .bottom-nav {
        height: 52px;
        padding-top: 8px;
      }

      .main {
        display: flex;
        width: 100vw;
        height: 100vh;
        padding-left: 256px;
        overflow: hidden;
        background: var(--app-bg);
      }

      .surface {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background: var(--surface);
        color: var(--text);
      }

      .page-header {
        display: flex;
        height: 84px;
        padding: 32px 32px 0;
      }

      .title-group {
        width: 100%;
        height: 52px;
      }

      h1,
      p { margin: 0; }

      h1 {
        height: 24px;
        font-size: 16px;
        font-weight: 600;
        line-height: 24px;
        letter-spacing: -0.4px;
      }

      .subtitle {
        height: 24px;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 24px;
      }

      .page-content {
        display: flex;
        height: 488px;
        padding: 0 32px 32px;
      }

      .dashboard-column {
        display: flex;
        flex-direction: column;
        width: 672px;
        max-width: 672px;
        height: 456px;
        padding-top: 24px;
        gap: 32px;
      }

      .stats-card {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        width: 672px;
        height: 78px;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .stat-cell {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 76px;
        padding: 16px;
        gap: 4px;
        border-right: 1px solid var(--border);
        color: var(--text);
        text-align: left;
      }

      .stat-cell:last-child { border-right: 0; }

      .stat-number {
        display: block;
        height: 24px;
        font-size: 24px;
        font-weight: 700;
        line-height: 24px;
      }

      .stat-label {
        display: block;
        height: 16px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
        line-height: 16px;
      }

      .panel-section { width: 672px; }
      .attention { height: 150px; }
      .actions { height: 140px; }

      .section-title {
        height: 20px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        line-height: 20px;
        letter-spacing: 0.6px;
      }

      .empty-card {
        width: 672px;
        height: 118px;
        margin-top: 12px;
        padding: 32px 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .empty-title {
        height: 28px;
        font-size: 16px;
        font-weight: 500;
        line-height: 28px;
      }

      .empty-subtitle {
        height: 24px;
        color: var(--muted);
        font-size: 14px;
        line-height: 24px;
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(2, 332px);
        gap: 8px;
        width: 672px;
        height: 108px;
        margin-top: 12px;
      }

      .quick-action {
        display: flex;
        align-items: center;
        width: 332px;
        height: 50px;
        padding: 14px 16px;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        text-align: left;
      }

      .quick-action .icon-sm {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <svg width="0" height="0" style="position:absolute;visibility:hidden" aria-hidden="true" focusable="false">
      <symbol id="i-dashboard" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></symbol>
      <symbol id="i-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
      <symbol id="i-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></symbol>
      <symbol id="i-folder" viewBox="0 0 24 24"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 9H20a2 2 0 0 1 1.94 2.5l-1.54 6A2 2 0 0 1 18.46 19H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.17a2 2 0 0 1 1.41.59L12 5h6a2 2 0 0 1 2 2v2"/></symbol>
      <symbol id="i-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
      <symbol id="i-dumbbell" viewBox="0 0 24 24"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></symbol>
      <symbol id="i-utensils" viewBox="0 0 24 24"><path d="m16 2-2.3 2.3a4 4 0 0 0 0 5.7L20 16"/><path d="m8 2 12 12"/><path d="m5 2 4.8 4.8"/><path d="M3 14.5 9.5 21"/><path d="M14 3.5 3.5 14"/></symbol>
      <symbol id="i-book" viewBox="0 0 24 24"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></symbol>
      <symbol id="i-clipboard-list" viewBox="0 0 24 24"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></symbol>
      <symbol id="i-clipboard-check" viewBox="0 0 24 24"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></symbol>
      <symbol id="i-user-plus" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></symbol>
      <symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></symbol>
    </svg>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo-row" aria-label="CoachEasy">
          <svg class="logo" viewBox="0 0 154.297 28" role="img" aria-label="CoachEasy">
            <defs>
              <linearGradient id="logoGradient" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#2b7fff" />
                <stop offset="1" stop-color="#2dd4bf" />
              </linearGradient>
            </defs>
            <rect x="0" y="1" width="26" height="26" rx="8" fill="url(#logoGradient)" />
            <path d="M9 14.5 12.2 18 18 10" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
            <text x="34" y="20.8" font-family="Inter, sans-serif" font-size="21" font-weight="700" letter-spacing="-0.65" fill="#111827">Coach<tspan fill="#2563eb">Easy</tspan></text>
          </svg>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <div class="nav-top">
            <a class="nav-item active" href="#"><svg class="icon"><use href="#i-dashboard" /></svg><span class="nav-label">Dashboard</span></a>
            <a class="nav-item" href="#"><svg class="icon"><use href="#i-users" /></svg><span class="nav-label">Clients</span></a>
            <a class="nav-item" href="#"><svg class="icon"><use href="#i-inbox" /></svg><span class="nav-label">Prospects</span></a>

            <div class="library-group">
              <button class="group-toggle"><svg class="icon-sm"><use href="#i-folder" /></svg><span class="nav-label">Library</span><svg class="icon-sm chevron-down"><use href="#i-chevron" /></svg></button>
              <div class="sub-menu">
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-dumbbell" /></svg><span>Exercises</span></a>
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-utensils" /></svg><span>Foods</span></a>
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-book" /></svg><span>Recipes</span></a>
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-clipboard-list" /></svg><span>Nutrition Plans</span></a>
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-clipboard-list" /></svg><span>Training Plans</span></a>
                <a class="sub-item" href="#"><svg class="icon"><use href="#i-clipboard-check" /></svg><span>Check-ins</span></a>
              </div>
            </div>
          </div>

          <hr class="separator" />
          <div class="bottom-nav">
            <a class="settings-link" href="#"><svg class="icon"><use href="#i-settings" /></svg><span class="nav-label">Settings</span></a>
          </div>
        </nav>
      </aside>

      <main class="main">
        <div class="surface">
          <header class="page-header">
            <div class="title-group">
              <h1>Good evening, Vikas</h1>
              <p class="subtitle">qatest</p>
            </div>
          </header>

          <section class="page-content">
            <div class="dashboard-column">
              <div class="stats-card" aria-label="Dashboard stats">
                <button class="stat-cell"><span class="stat-number">0</span><span class="stat-label">Active clients</span></button>
                <button class="stat-cell"><span class="stat-number">0</span><span class="stat-label">Pending invites</span></button>
                <button class="stat-cell"><span class="stat-number">0</span><span class="stat-label">New prospects</span></button>
                <button class="stat-cell"><span class="stat-number">0</span><span class="stat-label">Clients won</span></button>
              </div>

              <section class="panel-section attention">
                <p class="section-title">Needs your attention</p>
                <div class="empty-card">
                  <p class="empty-title">You're all caught up</p>
                  <p class="empty-subtitle">New prospects and pending invites will show up here.</p>
                </div>
              </section>

              <section class="panel-section actions">
                <p class="section-title">Quick actions</p>
                <div class="quick-grid">
                  <button class="quick-action"><svg class="icon-sm"><use href="#i-user-plus" /></svg><span>Invite a client</span></button>
                  <button class="quick-action"><svg class="icon-sm"><use href="#i-dumbbell" /></svg><span>New training plan</span></button>
                  <button class="quick-action"><svg class="icon-sm"><use href="#i-utensils" /></svg><span>New nutrition plan</span></button>
                  <button class="quick-action"><svg class="icon-sm"><use href="#i-globe" /></svg><span>Edit landing page</span></button>
                </div>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
