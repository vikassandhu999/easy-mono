                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/me:
    get:
      summary: Get coach profile
      description: >-
        Returns the authenticated coach's profile including their business info
        (name, slug for invite link). Used by the coach settings page. Frontend
        pattern — fetch on settings page mount and cache; refetch after profile
        updates.
      operationId: getCoachProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coach profile with business info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachProfileResponse"
              example:
                data:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  first_name: Rajat
                  last_name: Jain
                  email: rajat@fitcoach.in
                  phone: "+91 99999 12345"
                  business:
                    id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    name: FitCoach Pro
                    slug: rajat-jain
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires coach role
    patch:
      summary: Update coach profile
      description: >-
        Updates the coach's name, phone, and/or business name in a single call.
        The backend updates both the Coach and Business records transactionally.
        Used by the coach settings page inline edit rows. Frontend pattern —
        optimistic update on the cached profile, refetch on error. The business
        slug is not editable.
      operationId: updateCoachProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachProfileUpdateRequest"
            examples:
              default:
                value:
                  first_name: Rajat
                  last_name: Jain
                  phone: "+91 99999 12345"
                  business_name: FitCoach Pro
      responses:
        "200":
          description: Updated coach profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — requires coach role
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients/invite:
    post:
      summary: Invite client
      description: >-
        Creates a client with status pending. At least one of email or phone is
        required. If email is provided, an invitation email is sent
        automatically; if only phone is provided, the client record is created
        with an invite link but no email is sent — the coach shares the link
        manually (e.g. via WhatsApp). The response always includes `invite_url`,
        `invitation_sent_at`, and `invitation_expires_at` (30 days after
        sent_at) for the coach to render the "Share invitation" widget.
        Rejected with 422 if the email is the coach's own email, or is already
        an active client of another business (MVP "one active Client per User"
        invariant). Frontend pattern - on success show the invite_url for
        sharing, add the new client to the local list.
      operationId: inviteClient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInviteRequest"
            examples:
              with_email:
                value:
                  email: vikas@email.com
                  first_name: Vikas
                  last_name: Sandhu
                  phone: "+91 98765 43210"
                  notes: Interested in fat loss program
              phone_only:
                value:
                  first_name: Priya
                  phone: "+91 99999 88888"
                  notes: WhatsApp lead from Instagram
      responses:
        "201":
          description: Client invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
              examples:
                created:
                  value:
                    data:
                      id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      email: vikas@email.com
                      first_name: Vikas
                      last_name: Sandhu
                      phone: "+91 98765 43210"
                      notes: Interested in fat loss program
                      status: pending
                      invite_url: "https://app.coachapp.com/invite/abc123def456"
                      invitation_sent_at: "2026-03-26T10:00:00Z"
                      invitation_expires_at: "2026-04-25T10:00:00Z"
                      inserted_at: "2026-03-26T10:00:00Z"
                      updated_at: "2026-03-26T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: >-
            Validation error. In addition to the usual changeset errors, the
            endpoint returns field-level messages for:
            `email: ["you can't invite yourself as a client"]` when the coach
            tries to invite their own email, and
            `email: ["is already an active client of another business"]` when
            the email is a currently-active Client anywhere in the system.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
  /v1/coach/clients/{id}/resend-invite:
    post:
      summary: Resend invite email
      description: >-
        Re-sends the invitation email for a client with status pending and an
        email address. Bumps `invitation_sent_at` to now, which resets the
        30-day expiry window — `invitation_expires_at` in the response will
        reflect this. Returns 422 if the client is not in pending status or
        has no email. Frontend pattern - show loading state on the resend
        button, update the widget's "Invited X ago" timestamp from the
        response, display success toast on 200, show error toast on 422.
      operationId: resendClientInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Invite email resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/coach/clients/{id}:
    get:
      summary: Get client
      description: >-
        Returns a single client with contact info and status. `first_name` and
        `last_name` are authoritative from the linked User when one exists
        (post-acceptance), falling back to the coach-set Client values for
        pending clients or when the User's name is blank. For pending clients
        with an invitation_token, `invite_url`, `invitation_sent_at`, and
        `invitation_expires_at` are included; otherwise they are null. Frontend
        pattern - cache by id, refetch after mutations.
      operationId: getClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update client
      description: >-
        Updates client contact info and optionally transitions status. Status
        transitions are restricted per the spec's invariants:
        `active -> inactive | archived`, `inactive -> active | archived`,
        `archived -> active | inactive`. Nothing may be manually set to
        `pending` (once a Client has been linked to a User the link is
        permanent), and pending clients cannot be manually moved to any other
        status — they only reach `active` via the accept-invite flow. Contact
        fields (first_name, last_name, phone, email, notes) can still be
        updated on a pending client so the coach can prepare plans/notes before
        the client accepts. Frontend pattern - patch local form state
        optimistically and reconcile canonical payload from the 200 response.
      operationId: updateClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateRequest"
            examples:
              update_contact:
                value:
                  first_name: Vikas
                  last_name: Sandhu
                  phone: "+91 98765 43210"
              change_status:
                value:
                  status: archived
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >-
            Validation error. Invalid status transitions return field-level
            messages such as `status: ["cannot return to pending"]`,
            `status: ["pending clients can only become active by accepting the invitation"]`,
            or `status: ["invalid status transition"]`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
    delete:
      summary: Revoke invitation
      description: >-
        Hard-deletes a pending client (revokes the invitation). Valid only when
        `status == pending`; non-pending clients must be archived via PATCH
        instead. Cascades to personal training/nutrition plans assigned to this
        client (templates are preserved), and nilifies any `leads.client_id`
        reference. Frontend pattern - call from the "Revoke invitation" action
        on the pending client detail page, then remove the client from local
        lists. The client's invite URL becomes invalid immediately.
      operationId: revokeClientInvitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Pending client hard-deleted; no content returned.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >-
            Client is not pending. Returns
            `status: ["only pending invitations can be revoked; archive the client instead"]`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
