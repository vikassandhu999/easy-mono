    NutritionDailySummary:
      type: object
      required: [headline, calories, protein, carbs, fats]
      description: >-
        Per-macro actual vs target comparison with a motivational headline (UX spec
        Surface 4.1). Actual values are summed from food_log_entries for the date.
        Target values come from the plan's macros_goal. Headline is computed server-side
        to keep tone consistent ("Crushing protein" / "X cal under target" / "On point
        today"). Null headline when the plan has no macros_goal.
      properties:
        headline:
          type: string
          nullable: true
          description: >-
            Motivational headline for the nutrition daily view. See spec Surface 4.1
            for the full rule set. Null when plan has no macro targets.
        calories:
          $ref: "#/components/schemas/MacroComparison"
        protein:
          $ref: "#/components/schemas/MacroComparison"
        carbs:
          $ref: "#/components/schemas/MacroComparison"
        fats:
          $ref: "#/components/schemas/MacroComparison"
