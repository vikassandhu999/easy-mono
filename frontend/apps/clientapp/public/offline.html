<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Offline - CoachEasy</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        padding: 20px;
      }

      .offline-container {
        max-width: 400px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .offline-icon {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.8;
      }

      .offline-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .offline-message {
        font-size: 16px;
        line-height: 1.5;
        opacity: 0.9;
        margin-bottom: 30px;
      }

      .retry-button {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .retry-button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      .features-list {
        margin-top: 30px;
        text-align: left;
      }

      .features-list h3 {
        font-size: 18px;
        margin-bottom: 15px;
        text-align: center;
      }

      .features-list ul {
        list-style: none;
        padding: 0;
      }

      .features-list li {
        padding: 8px 0;
        opacity: 0.8;
        position: relative;
        padding-left: 20px;
      }

      .features-list li:before {
        content: "✓";
        position: absolute;
        left: 0;
        color: #4ade80;
        font-weight: bold;
      }

      @media (max-width: 480px) {
        .offline-container {
          padding: 30px 15px;
        }

        .offline-title {
          font-size: 20px;
        }

        .offline-message {
          font-size: 14px;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📱</div>
      <h1 class="offline-title">You're Offline</h1>
      <p class="offline-message">
        No internet connection found. Check your connection and try again.
      </p>

      <button class="retry-button" onclick="window.location.reload()">
        Try Again
      </button>

      <div class="features-list">
        <h3>Available Offline Features</h3>
        <ul>
          <li>View cached workout programs</li>
          <li>Access saved meal plans</li>
          <li>Review progress history</li>
          <li>Browse offline content</li>
        </ul>
      </div>
    </div>

    <script>
      // Auto-reload when connection is restored
      window.addEventListener("online", () => {
        window.location.reload();
      });

      // Check connection status
      function checkConnection() {
        if (navigator.onLine) {
          window.location.reload();
        }
      }

      // Check every 5 seconds
      setInterval(checkConnection, 5000);

      // Prevent right-click and text selection for PWA feel
      document.addEventListener("contextmenu", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());
    </script>
  </body>
</html>
