  # ── Leads ───────────────────────────────────────────────────
  /v1/coach/leads:
    get:
      summary: List leads
      description: Returns leads for the coach's business with optional status filter. Powers the leads management section with tab-based filtering (All/New/Contacted/Converted/Rejected). Frontend pattern - fetch with status param on tab change, cache per tab, refetch after status updates.
      operationId: listLeads
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OffsetQuery"
