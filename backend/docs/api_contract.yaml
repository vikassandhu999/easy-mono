          application/json:
            schema:
              $ref: "#/components/schemas/BusinessCreateRequest"
      responses:
        "201":
          description: Business created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /v1/businesses/me:
    get:
      summary: Get current business
      operationId: getMyBusiness
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Update current business
      operationId: updateMyBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdateRequest"
      responses:
        "200":
