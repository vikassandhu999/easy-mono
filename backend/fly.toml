# fly.toml app configuration file generated for easy-backend on 2026-02-15T10:22:22+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'easy-backend'
primary_region = 'bom'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[deploy]
release_command = '/app/bin/migrate'

[env]
PHX_HOST = 'easy-backend.fly.dev'
PORT = '8080'
ECTO_IPV6 = 'true'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
# Keep one machine warm so a live demo never hits a cold start. Drop to 0 to save
# cost once past the demo window.
min_machines_running = 1
processes = ['app']

[[http_service.checks]]
grace_period = '20s'
interval = '15s'
method = 'GET'
path = '/api/health'
timeout = '5s'

[http_service.concurrency]
type = 'connections'
hard_limit = 1000
soft_limit = 1000

[[vm]]
memory = '1gb'
cpus = 1
memory_mb = 1024
