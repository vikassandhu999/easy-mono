          nullable: true
        notes:
          type: string
          nullable: true
        exercise_id:
          type: string
        exercise:
          $ref: "#/components/schemas/ClientExerciseSummary"
        planned_sets:
          type: array
          items:
            $ref: "#/components/schemas/PlannedSet"
        inserted_at:
          type: string
          format: date-time
        updated_at:
