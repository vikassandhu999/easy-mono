      summary: Create testimonial
      description: Creates a client testimonial or transformation result for the storefront. At least one of quote or before_image_url is required. If both before_weight and after_weight are provided and result_tag is empty, the server auto-suggests a result tag. Frontend pattern - redirect to testimonial list after creation.
