          description: Testimonials list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestimonialListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/coach/testimonials/{id}:
    get:
      summary: Get testimonial
      description: Returns a single testimonial for the edit form. Frontend pattern - cache by id, refetch after edit.
      operationId: getTestimonial
