  /v1/coach/training_plans/{id}:
    get:
      summary: Get training plan
      description: >-
        Returns any plan (template or personal) with nested workouts, elements,
        and preloaded client. Response includes rest_days array for building the
        7-day weekly overview (Mon-Sun). Workouts are grouped by day_number
        (1=Mon..7=Sun); days without workouts that appear in rest_days show as
        "Rest"; remaining empty days show as unassigned. Frontend pattern - treat
        this as source of truth for the plan builder weekly overview.
      operationId: getTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Training plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update training plan
      description: >-
        Saves plan metadata changes including rest_days and coach_note. Send the
        full rest_days array on every update (toggle rest on = add to array, toggle
        off = remove). The frontend should hide the rest day toggle for days that
        have workouts. Updating coach_note immediately changes what the assigned
        client sees on their Today screen; the client app should refetch the active
        plan (or re-poll the today endpoint) after a coach-side edit. Send `null`
        to clear the coach note. Frontend pattern - patch local plan state
        immediately and reconcile from response body.
      operationId: updateTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingPlanUpdateRequest"
            examples:
              default:
                value:
                  name: 12-Week Strength Base (Revised)
                  description: Progressive overload with lighter deload weeks.
                  coach_note: "Deload week \u2014 keep the weights light and focus on form."
                  status: active
      responses:
        "200":
          description: Training plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete training plan
      description: Deletes a plan and is typically used from destructive actions in plan management screens. Frontend pattern - require confirmation, optimistically remove card/row, then invalidate list query.
      operationId: deleteTrainingPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Training plan deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/coach/training_plans/{id}/assign:
