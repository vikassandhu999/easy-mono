              $ref: "#/components/schemas/TestimonialUpdateRequest"
      responses:
        "200":
          description: Testimonial updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestimonialResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
